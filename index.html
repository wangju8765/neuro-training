<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>🧠 神经训练</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{font-family:-apple-system,'PingFang SC','Noto Sans SC',sans-serif;background:#0f1923;color:#e8edf2;display:flex;flex-direction:column;}

/* ===== 页面容器 ===== */
.page{display:none;flex-direction:column;min-height:100vh;}
.page.active{display:flex;}

/* ===== 首页 ===== */
.scroll{flex:1;overflow-y:auto;padding:10px 14px 20px;}
.scroll{padding:16px 20px 32px;}
.title{font-size:26px;font-weight:700;margin-bottom:4px;}
.hello{font-size:15px;color:#7a94b0;margin-bottom:16px;}

/* 进度卡片 */
.pc{background:#1a2b3c;border-radius:14px;padding:16px;margin-bottom:16px;border:1px solid #1f3348;}
.pc .r{display:flex;justify-content:space-between;font-size:13px;color:#7a94b0;margin-bottom:6px;}
.pc .r .n{color:#4fc3f7;font-size:18px;font-weight:700;}
.pb{height:6px;background:#1f3348;border-radius:3px;overflow:hidden;margin-bottom:6px;}
.pb .f{height:100%;background:linear-gradient(90deg,#4fc3f7,#81d4fa);border-radius:3px;transition:width .4s;}
.pc .sub{font-size:13px;color:#5a7a98;}

/* 套餐标题 */
.plan-l{font-size:14px;color:#8aa0b8;font-weight:600;margin-bottom:8px;}

/* 练习列表 */
.el{display:flex;flex-direction:column;gap:8px;}
.ex{display:flex;align-items:center;gap:12px;padding:14px;border-radius:10px;background:#1a2b3c;border:1px solid #1f3348;cursor:pointer;transition:.12s;}
.ex:active{background:#1f3348;transform:scale(.98);}
.ex .ck{width:22px;height:22px;border-radius:50%;border:2px solid #2d4c6e;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:#4fc3f7;}
.ex.done .ck{border-color:#4fc3f7;background:rgba(79,195,247,.1);}
.ex .ic{font-size:20px;width:28px;text-align:center;flex-shrink:0;}
.ex .inf{flex:1;font-size:15px;font-weight:600;}
.ex .inf .s{font-size:13px;font-weight:400;color:#5a7a98;}
.ex .tm{font-size:13px;color:#5a7a98;flex-shrink:0;}
.ex .tm.done{color:#4fc3f7;}

/* 标签按钮 */
.tags{display:flex;gap:6px;margin-top:14px;overflow-x:auto;}
.tags::-webkit-scrollbar{display:none;}
.tagb{flex-shrink:0;padding:7px 14px;border-radius:20px;font-size:13px;background:#1a2b3c;border:1px solid #1f3348;color:#8aa0b8;cursor:pointer;white-space:nowrap;}
.tagb:active{background:#2d4c6e;}
.tagb.ac{background:#2d4c6e;border-color:#4fc3f7;color:#4fc3f7;}

/* 使用说明 */
.us{background:#1a2b3c;border-radius:10px;padding:12px 14px;border:1px solid #1f3348;font-size:13px;color:#7a94b0;margin-top:16px;line-height:1.6;}
.us .ut{color:#8aa0b8;font-weight:600;margin-bottom:4px;}

/* ===== 顶栏 ===== */
.top{display:flex;align-items:center;padding:14px 18px;gap:10px;border-bottom:1px solid #1f3348;font-size:14px;flex-shrink:0;}
.top .bk{font-size:20px;opacity:.7;cursor:pointer;}
.top .mi{flex:1;text-align:center;font-weight:600;font-size:16px;}
.top .ri{color:#7a94b0;font-size:14px;min-width:40px;text-align:right;}

/* ===== 跟练页 ===== */
.p-inner{flex:1;display:flex;flex-direction:column;align-items:center;padding:20px;gap:10px;overflow-y:auto;}

.ei{text-align:center;margin-bottom:4px;flex-shrink:0;}
.ei .en{font-size:22px;font-weight:700;}
.ei .inf{font-size:13px;color:#5a7a98;}

.sn{font-size:13px;color:#5a7a98;flex-shrink:0;}
.sn .st{color:#c8d6e5;margin-left:4px;}

/* 画布 */
.cv{width:200px;height:200px;background:#1a2b3c;border-radius:14px;position:relative;flex-shrink:0;}
#pc{width:100%;height:100%;display:block;}
.cv .tm{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;}
.cv .tm .n{font-size:36px;font-weight:200;color:#4fc3f7;line-height:1;}
.cv .tm .l{font-size:14px;color:#5a7a98;}

/* 步骤点 */
.dots{display:flex;gap:6px;flex-shrink:0;margin:4px 0;}
.dots div{width:8px;height:8px;border-radius:50%;background:#1f3348;transition:.2s;}
.dots .act{background:#4fc3f7;transform:scale(1.2);}
.dots .dn{background:#a5d6a7;}

/* 步骤卡片 */
.sc{width:100%;max-width:340px;margin-top:auto;background:#1a2b3c;border-radius:12px;padding:14px 16px;border:1px solid #1f3348;font-size:13px;color:#8aa0b8;flex-shrink:0;}
.sc .tg2{display:inline-block;background:#2d4c6e;padding:2px 8px;border-radius:4px;margin-top:4px;font-size:12px;color:#a0c4e8;}

/* 按钮 */
.act{width:100%;max-width:340px;display:flex;flex-direction:column;gap:8px;flex-shrink:0;padding-bottom:8px;}
.act .r1{display:flex;gap:8px;}
.act .r1 .b{flex:1;padding:15px;border:none;border-radius:12px;font-size:15px;font-weight:600;text-align:center;cursor:pointer;transition:.12s;}
.act .r1 .b:active{transform:scale(.97);}
.bp{background:linear-gradient(135deg,#4fc3f7,#29b6f6);color:#0f1923;}
.bp:disabled{opacity:.3;cursor:not-allowed;transform:none;}
.bs{background:#1f3348;color:#8aa0b8;}
.bo{padding:14px;border-radius:12px;border:1px solid #2d4c6e;background:transparent;color:#8aa0b8;font-size:15px;font-weight:600;text-align:center;cursor:pointer;transition:.12s;}
.bo:active{background:#1f3348;}

/* ===== 弹窗 ===== */
.ol,.cf{display:none;position:fixed;inset:0;z-index:100;align-items:center;justify-content:center;}
.ol.show,.cf.show{display:flex;}
.ol{background:rgba(15,25,35,.95);flex-direction:column;gap:12px;}
.ol .oi{font-size:56px;}
.ol .ot{font-size:20px;font-weight:700;color:#a5d6a7;text-align:center;}
.ol .os{font-size:14px;color:#7a94b0;text-align:center;max-width:300px;}
.ol .od{font-size:13px;color:#5a7a98;text-align:center;line-height:1.6;}
.ol-btn{display:flex;gap:10px;width:300px;padding:0;}
.ol-btn .b{flex:1;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;text-align:center;}

.cf{background:rgba(15,25,35,.92);}
.cf .bx{background:#1a2b3c;border-radius:16px;padding:28px 24px;border:1px solid #1f3348;text-align:center;max-width:300px;}
.cf .bx .ct{font-size:18px;font-weight:600;margin-bottom:6px;}
.cf .bx .cs{font-size:13px;color:#7a94b0;margin-bottom:16px;}
.cf .bx .cr{display:flex;gap:10px;}
.cf .bx .cr .b{flex:1;padding:12px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;}

/* ===== 阻止下拉刷新 ===== */
body{overflow:hidden;overscroll-behavior:none;}
.scroll,.p-inner{-webkit-overflow-scrolling:touch;}
</style>
</head>
<body>

<!-- ========== 首页 ========== -->
<div class="page active" id="pH">
  <div class="scroll">
    <div class="title">🧠 神经训练</div>
    <div class="hello" id="gr">🌅 早上好，茂懿</div>

    <div class="pc">
      <div class="r"><span>今日完成</span><span class="n" id="pgN">0 / 3</span></div>
      <div class="pb"><div class="f" id="pgB" style="width:0%"></div></div>
      <div class="sub" id="pgT">点击练习开始</div>
    </div>

    <div class="plan-l" id="plT">☀️ 早晨套餐</div>

    <div class="el" id="exL"></div>

    <div class="tags" id="tgT"></div>

    <div class="us">
      <div class="ut">💡 使用说明</div>
      每个练习可跟练（有步骤引导），也可自由做（做完点"我做完了"）。熟练后无需每次都跟练。
    </div>
  </div>
</div>

<!-- ========== 跟练页 ========== -->
<div class="page" id="pP">
  <div class="top">
    <span class="bk" onclick="cfExit()">✕</span>
    <span class="mi" id="pTi">练习</span>
    <span class="ri" id="pPd"></span>
  </div>
  <div class="p-inner">

    <div class="ei">
      <div class="en" id="pEn">⛏️ 交叉爬行</div>
      <div class="inf" id="pIf">原始反射整合 · 约2分钟</div>
    </div>

    <div class="sn"><span id="pSn">准备</span> <span class="st" id="pSt"></span></div>

    <div class="cv">
      <canvas id="pc" width="200" height="200"></canvas>
      <div class="tm"><div class="n" id="pTim"></div><div class="l" id="pTimL"></div></div>
    </div>

    <div class="dots" id="pDt"></div>

    <div class="sc" id="pSc"></div>

    <div class="act">
      <div class="r1">
        <button class="b bs" onclick="resetP()">🔄 重来</button>
        <button class="b bp" id="pBtn" disabled>▶ 开始</button>
      </div>
      <button class="bo" onclick="doneP()">✅ 我做完了（跳过跟练）</button>
    </div>

  </div>
</div>

<!-- ========== 完成弹窗 ========== -->
<div class="ol" id="ol">
  <div class="oi">🎉</div>
  <div class="ot" id="olT">完成！</div>
  <div class="os" id="olS"></div>
  <div class="od" id="olD"></div>
  <div class="ol-btn">
    <button class="b bs" onclick="clOl();goH()">🏠 首页</button>
    <button class="b bp" onclick="clOl();goH()">📋 继续任务</button>
  </div>
</div>

<!-- ========== 退出确认 ========== -->
<div class="cf" id="cf">
  <div class="bx">
    <div class="ct">退出练习？</div>
    <div class="cs">进度不会丢失，下次继续</div>
    <div class="cr">
      <button class="b bs" onclick="clCf()" style="background:#1f3348;color:#8aa0b8;">留在这里</button>
      <button class="b bp" onclick="doExit()" style="background:linear-gradient(135deg,#4fc3f7,#29b6f6);color:#0f1923;">退出</button>
    </div>
  </div>
</div>

<script>
// ===== 数据 =====
const EX = [
  {i:'cold',    n:'冷水唤醒',    ic:'❄️',  t:'1min',  c:'迷走神经', no:'洗漱时做',
    s:[{t:'冷水拍脸颊眼周',   h:'',   d:8},{t:'冷水拍脖子前侧',   h:'',   d:6},{t:'深吸气缓慢呼出',  h:'',   d:8},{t:'深呼吸第二次',    h:'',   d:8},{t:'深呼吸第三次',    h:'',   d:8}]},
  {i:'bee',     n:'蜜蜂呼吸',    ic:'🐝',  t:'2min',  c:'迷走神经',
    s:[{t:'坐直闭眼',         h:'',   d:0},{t:'深吸一口气',        h:'',   d:4},{t:'呼气时嗡嗡嗡——',   h:'感受震动', d:8},{t:'深呼吸再来一次',   h:'',   d:4},{t:'呼气嗡——',  h:'',   d:8},{t:'最后一次深呼吸',   h:'',   d:4},{t:'呼气嗡——睁眼',     h:'',   d:10}]},
  {i:'crawl',   n:'交叉爬行',    ic:'⛏️',  t:'2min',  c:'反射整合',
    s:[{t:'抬右手时抬左膝',   h:'慢慢来',d:15},{t:'抬左手时抬右膝',   h:'',   d:15},{t:'加快速度交替',    h:'',   d:15},{t:'放慢最后5次',    h:'',   d:10}]},
  {i:'starfish',n:'海星呼吸',    ic:'🦑',  t:'2min',  c:'反射整合', cy:5,
    s:[{t:'仰卧躺平手脚展开',  h:'',   d:0},{t:'慢慢吸气手脚向外展开',h:'像海星张开', d:4},{t:'屏住呼吸保持展开',  h:'',   d:2},{t:'慢慢呼气手脚收回胸前',h:'抱胸弯腿', d:6},{t:'放松休息一下',     h:'',   d:3}]},
  {i:'snow',    n:'雪天使',      ic:'❄️',  t:'2min',  c:'反射整合',
    s:[{t:'仰卧手臂放两侧',   h:'脊椎贴地',d:0},{t:'呼气手臂滑向头顶',  h:'',   d:6},{t:'吸气手臂滑回',     h:'',   d:6},{t:'重复：呼上吸下',   h:'',   d:24},{t:'最后一次放松',    h:'',   d:6}]},
  {i:'ball',    n:'球上平衡',    ic:'🏐',  t:'2min',  c:'反射整合', no:'需瑜伽球',
    s:[{t:'趴在球上手脚撑地', h:'',   d:0},{t:'轻轻前后滚',        h:'',   d:20},{t:'试着举手平衡',     h:'',   d:16},{t:'慢慢停下深呼吸',   h:'',   d:8}]},
  {i:'spin',    n:'旋转脱敏',    ic:'🌀',  t:'2min',  c:'前庭-小脑',
    s:[{t:'闭眼原地转3圈',   h:'',   d:12},{t:'停下来看固定点',     h:'',   d:8},{t:'再闭眼转3圈',    h:'',   d:10},{t:'看固定点',         h:'',   d:8},{t:'深呼吸2次',        h:'',   d:6}]},
  {i:'oneLeg',  n:'单脚站',      ic:'🦩',  t:'2min',  c:'前庭-小脑',
    s:[{t:'叉腰左脚抬起',     h:'',   d:15},{t:'换右脚',            h:'',   d:15},{t:'左脚闭眼试试',     h:'',   d:10},{t:'右脚闭眼',         h:'',   d:10},{t:'放松抖抖腿',       h:'',   d:6}]},
  {i:'bounce',  n:'弹跳训练',    ic:'🏀',  t:'2min',  c:'前庭-小脑', no:'有蹦床更佳',
    s:[{t:'原地自由弹跳',     h:'',   d:20},{t:'跳高摸墙',          h:'',   d:20},{t:'边跳边拍手',       h:'',   d:15},{t:'慢慢停下深呼吸',   h:'',   d:8}]},
  {i:'yawn',    n:'打哈欠激活',  ic:'🥱',  t:'30s',   c:'预备',
    s:[{t:'用力打一个真正的哈欠',h:'假打也能变成真打',d:0},{t:'捏住鼻子闭嘴呼气',h:'不出气', d:8},{t:'松开深呼吸一次',   h:'',   d:6},{t:'最后一次深呼吸',   h:'',   d:6}]},
  {i:'ear',     n:'耳朵拉拽',    ic:'👂',  t:'30s',   c:'预备',
    s:[{t:'从耳朵上端向下轻拉',h:'',   d:8},{t:'换另一只耳朵',      h:'',   d:8},{t:'两只耳朵同时拉',   h:'',   d:6},{t:'揉一揉放松',       h:'',   d:4}]},
  {i:'shake',   n:'全身抖动',    ic:'💃',  t:'1min',  c:'预备',
    s:[{t:'站起来从手开始甩', h:'',   d:8},{t:'手臂一起甩',        h:'',   d:8},{t:'全身都抖起来',     h:'',   d:12},{t:'慢慢停下深呼吸',   h:'',   d:6}]},
  {i:'yawn2',   n:'哈欠深呼吸',  ic:'😮',  t:'1min',  c:'迷走神经',
    s:[{t:'张嘴打一个大哈欠', h:'',   d:6},{t:'用力吞咽口水',       h:'',   d:4},{t:'伸个懒腰',         h:'',   d:6},{t:'再打哈欠再吞咽',   h:'',   d:6},{t:'深呼吸放松',       h:'',   d:6}]},
  {i:'finger',  n:'指尖对碰',    ic:'🤏',  t:'2min',  c:'精细运动',
    s:[{t:'拇指依次碰食中无名小指',h:'右手先做', d:12},{t:'换左手',            h:'',   d:12},{t:'左右手同时',       h:'',   d:12},{t:'闭眼再做',         h:'',   d:12},{t:'抖抖手放松',       h:'',   d:4}]},
  {i:'rubber',  n:'橡皮筋拉伸',  ic:'🪢',  t:'2min',  c:'精细运动', no:'需橡皮筋',
    s:[{t:'指尖套橡皮筋',     h:'',   d:0},{t:'拇指食指撑开',       h:'',   d:12},{t:'拇指中指撑开',     h:'',   d:12},{t:'拇指无名指撑开',   h:'',   d:12},{t:'拇指小指撑开',     h:'',   d:12},{t:'换左手重复',       h:'',   d:20}]},
];

const PL = [
  {i:'morning',ic:'☀️', n:'早晨套餐', ids:['cold','bee','crawl']},
  {i:'am',     ic:'🌤️', n:'上午套餐', ids:['starfish','oneLeg','finger']},
  {i:'pm',     ic:'🏃',  n:'下午套餐', ids:['snow','ball','spin','bee']},
  {i:'night',  ic:'🌙',  n:'睡前套餐', ids:['snow','starfish','yawn2']},
];

function ex(i){return EX.find(x=>x.i===i);}

// ===== 状态 =====
let St={pi:0,dn:[],ex:null,cy:1,cs:1,st:-1,ss:[],pl:false,ti:null,rm:0};

// ===== 首页渲染 =====
function rH(){
  const p=PL[St.pi];
  document.getElementById('plT').textContent=p.ic+' '+p.n;
  document.getElementById('tgT').innerHTML=PL.map((x,i)=>`<div class="tagb ${i===St.pi?'ac':''}" onclick="St.pi=${i};rH()">${x.ic} ${x.n}</div>`).join('');
  const l=document.getElementById('exL');
  l.innerHTML=p.ids.map(id=>{
    const x=ex(id);if(!x)return'';
    const dn=St.dn.includes(id);
    return `<div class="ex ${dn?'done':''}" onclick="sX('${id}')">
      <div class="ck">${dn?'✓':''}</div><div class="ic">${x.ic}</div>
      <div class="inf">${x.n} <span class="s">${x.no||x.c} · ${x.t}</span></div>
      <div class="tm ${dn?'done':''}">${dn?'✅ 已完成':x.t}</div></div>`;
  }).join('');
  upPr();
}

function upPr(){
  const p=PL[St.pi];const t=p.ids.length;const d=p.ids.filter(id=>St.dn.includes(id)).length;
  document.getElementById('pgN').textContent=`${d} / ${t}`;
  document.getElementById('pgB').style.width=`${t>0?d/t*100:0}%`;
  const dn2=p.ids.filter(id=>St.dn.includes(id)).map(id=>{const x=ex(id);return x?x.ic+x.n:'';}).filter(Boolean);
  document.getElementById('pgT').textContent=d===t?'🎉 全部完成！':(dn2.length?'✅ '+dn2.join(' · '):'点击练习开始');
}

// ===== 进入跟练 =====
function sX(id){
  const x=ex(id);if(!x)return;
  St.ex=x;St.cs=x.cy||1;St.cy=1;St.st=-1;St.ss=x.s;St.pl=false;
  if(St.ti){clearInterval(St.ti);St.ti=null;}
  document.getElementById('pEn').textContent=x.ic+' '+x.n;
  document.getElementById('pIf').textContent=x.c+' · 约'+x.t;
  document.getElementById('pH').classList.remove('active');
  document.getElementById('pP').classList.add('active');
  uPpd();uP();
}

function uPpd(){
  const p=PL[St.pi];const d=p.ids.filter(id=>St.dn.includes(id)).length;
  document.getElementById('pPd').textContent=`${d}/${p.ids.length}`;
}

// ===== 跟练状态更新 =====
function uP(){
  if(!St.ex)return;const x=St.ex;const m=St.cs>1;
  const sn=document.getElementById('pSn'),st=document.getElementById('pSt'),sc=document.getElementById('pSc');
  const tn=document.getElementById('pTim'),tl=document.getElementById('pTimL'),btn=document.getElementById('pBtn');
  if(St.st===-1){
    sn.textContent='准备';st.innerHTML=''+(m?`第${St.cy}/${St.cs}轮 `:'')+St.ss[0].t;
    sc.textContent=St.ss[0].h?'💡 '+St.ss[0].h:'';
    tn.textContent='';tl.textContent='';
    btn.textContent='▶ 开始';btn.disabled=false;
    dr(0.15);rD(1,0);return;
  }
  const s=St.ss[St.st];
  sn.textContent=(m?`第${St.cy}轮·`:'')+'步'+(St.st+1)+'/'+St.ss.length;
  st.innerHTML=s.t;
  sc.innerHTML=(s.h?'💡 '+s.h:'')+(x.no&&St.st===0?`<br><span class="tg2">📌 ${x.no}</span>`:'');
  if(s.d>0){tn.textContent=St.pl?St.rm:s.d;tl.textContent='秒';}else{tn.textContent='';tl.textContent='';}
  if(m)rD(St.cs,St.cy-1);else rD(St.ss.length,St.st);
  if(St.pl){btn.textContent='⏳ 进行中...';btn.disabled=true;}else{btn.textContent='▶ 下一步';btn.disabled=false;}
  let ra=0.15;if(St.st>=1&&St.st<=2)ra=St.pl?0.3+0.7*(1-St.rm/s.d):1;
  dr(Math.max(0.15,Math.min(1,ra)));
}

function rD(n,a){
  const c=document.getElementById('pDt');
  c.innerHTML=Array.from({length:n},(_,i)=>{
    let cl='';if(i<a)cl=' dn';else if(i===a)cl=' act';
    return `<div class="${cl}"></div>`;
  }).join('');
}

function dr(sp){
  const c=document.getElementById('pc'),ctx=c.getContext('2d');
  const w=c.width,h=c.height,cx=w/2,cy=h/2;ctx.clearRect(0,0,w,h);
  const aa=30+60*sp,la=15+40*sp;
  ctx.beginPath();ctx.arc(cx,cy,72,0,Math.PI*2);
  ctx.fillStyle='rgba(79,195,247,0.04)';ctx.fill();
  const hy=cy-42-8*(1-sp);
  ctx.save();
  ctx.beginPath();ctx.ellipse(cx,hy+26,10,18,0,0,Math.PI*2);
  ctx.fillStyle='#4fc3f7';ctx.fill();
  ctx.beginPath();ctx.arc(cx,hy,13,0,Math.PI*2);
  ctx.fillStyle='#4fc3f7';ctx.fill();
  ctx.fillStyle='#0f1923';
  ctx.beginPath();ctx.arc(cx-4,hy,1.8,0,Math.PI*2);
  ctx.arc(cx+4,hy,1.8,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(cx,hy+4,4,0.1*Math.PI,0.9*Math.PI);
  ctx.strokeStyle='#0f1923';ctx.lineWidth=1.3;ctx.stroke();
  const sy=hy+14;ctx.strokeStyle='#4fc3f7';ctx.lineWidth=6;ctx.lineCap='round';
  let lx=cx-10-50*Math.cos((90-aa)*Math.PI/180)*sp,ly=sy-6+50*Math.sin((90-aa)*Math.PI/180)*sp;
  ctx.beginPath();ctx.moveTo(cx-10,sy);ctx.lineTo(lx,ly);ctx.stroke();
  let rx=cx+10+50*Math.cos((90-aa)*Math.PI/180)*sp,ry=sy-6+50*Math.sin((90-aa)*Math.PI/180)*sp;
  ctx.beginPath();ctx.moveTo(cx+10,sy);ctx.lineTo(rx,ry);ctx.stroke();
  const hy2=hy+44;
  lx=cx-5-36*Math.cos((90-la)*Math.PI/180)*sp;ly=hy2+36*Math.sin((90-la)*Math.PI/180)*sp;
  ctx.beginPath();ctx.moveTo(cx-5,hy2);ctx.lineTo(lx,ly);ctx.stroke();
  rx=cx+5+36*Math.cos((90-la)*Math.PI/180)*sp;ry=hy2+36*Math.sin((90-la)*Math.PI/180)*sp;
  ctx.beginPath();ctx.moveTo(cx+5,hy2);ctx.lineTo(rx,ry);ctx.stroke();
  ctx.restore();
}

// ===== 计时器 =====
document.getElementById('pBtn').addEventListener('click',()=>{
  if(!St.ex)return;
  if(St.st===-1){St.st=0;St.cy=1;uP();if(St.ss[0]&&St.ss[0].d>0)sT();return;}
  if(!St.pl)sT();
});

function sT(){
  const s=St.ss[St.st];if(!s||s.d<=0){ad();return;}
  St.rm=s.d;St.pl=true;uP();
  St.ti=setInterval(()=>{
    St.rm--;uP();
    if(St.rm<=0){clearInterval(St.ti);St.ti=null;St.pl=false;ad();}
  },1000);
}

function ad(){
  St.st++;St.pl=false;
  if(St.st>=St.ss.length){
    if(St.cy>=St.cs){fEx();return;}
    St.cy++;St.st=0;
  }
  uP();
  if(St.st<St.ss.length&&St.ss[St.st].d>0)sT();
}

function doneP(){fEx();}

// ===== 完成 =====
function fEx(){
  const id=St.ex.i;if(!St.dn.includes(id))St.dn.push(id);
  svD();
  const p=PL[St.pi];const ad=p.ids.every(xid=>St.dn.includes(xid));
  document.getElementById('ol').classList.add('show');
  document.getElementById('olT').textContent=`${St.ex.ic} ${St.ex.n} 完成！`;
  document.getElementById('olS').textContent=ad?'🎉 今日全部完成！茂懿真棒！':'继续加油，还有练习等着你 💪';
  const det=p.ids.map(id=>{const x=ex(id);const dn=St.dn.includes(id);return (dn?'✅':'⬜')+' '+(x?x.ic+x.n:'')}).join('<br>');
  document.getElementById('olD').innerHTML='今日进度：'+p.ids.filter(id=>St.dn.includes(id)).length+'/'+p.ids.length+'<br>'+det;
}

function resetP(){clOl();if(St.ti){clearInterval(St.ti);St.ti=null;}if(St.ex){St.st=-1;St.cy=1;St.pl=false;St.rm=0;uP();}}

// ===== 弹窗控制 =====
function clOl(){document.getElementById('ol').classList.remove('show');}
function goH(){clOl();clCf();if(St.ti){clearInterval(St.ti);St.ti=null;}document.getElementById('pP').classList.remove('active');document.getElementById('pH').classList.add('active');rH();}
function cfExit(){document.getElementById('cf').classList.add('show');}
function clCf(){document.getElementById('cf').classList.remove('show');}
function doExit(){clCf();goH();}

// ===== 本地存储 =====
function svD(){localStorage.setItem('nd_'+dk(),JSON.stringify(St.dn));}
function dk(){const d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
St.dn=(()=>{try{const r=localStorage.getItem('nd_'+dk());if(r)return JSON.parse(r);}catch(e){}return[];})();

// ===== 启动 =====
rH();
</script>
