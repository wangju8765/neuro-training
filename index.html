<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>🧠 神经训练</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,'PingFang SC','Noto Sans SC',sans-serif;background:#0f1923;color:#e8edf2;min-height:100dvh;overflow:hidden;}

.page{display:none;flex-direction:column;height:100dvh;}
.page.active{display:flex;}

.fl{flex:1;overflow-y:auto;padding:20px 16px;}

/* ===== 首页 ===== */
.hd{font-size:24px;font-weight:700;margin-bottom:2px;}
.hs{color:#7a94b0;font-size:13px;margin-bottom:18px;}
.pc{background:#1a2b3c;border-radius:14px;padding:14px;margin-bottom:16px;border:1px solid #1f3348;}
.pc .r{display:flex;justify-content:space-between;font-size:12px;color:#7a94b0;margin-bottom:7px;}
.pc .r .n{color:#4fc3f7;font-size:16px;font-weight:700;}
.pb{height:6px;background:#1f3348;border-radius:3px;overflow:hidden;margin-bottom:5px;}
.pb .f{height:100%;border-radius:3px;background:linear-gradient(90deg,#4fc3f7,#81d4fa);transition:width .4s;}
.pc .t2{font-size:11px;color:#5a7a98;margin-top:5px;}

.plh{font-size:13px;font-weight:600;color:#8aa0b8;margin-bottom:10px;}

/* 练习列表 */
.el{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.ex{display:flex;align-items:center;gap:10px;padding:11px 12px;background:#1a2b3c;border-radius:10px;cursor:pointer;transition:.15s;border:1px solid #1f3348;}
.ex:active{background:#1f3348;transform:scale(.98);}
.ex .ck{width:20px;height:20px;border-radius:50%;border:2px solid #2d4c6e;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:#4fc3f7;transition:.3s;}
.ex.done .ck{border-color:#4fc3f7;background:rgba(79,195,247,.1);}
.ex .ic{font-size:18px;width:26px;text-align:center;flex-shrink:0;}
.ex .in{flex:1;min-width:0;}
.ex .in .nm{font-size:14px;font-weight:600;}
.ex .in .sub{font-size:10px;color:#5a7a98;margin-top:1px;}
.ex .tm{font-size:11px;color:#5a7a98;flex-shrink:0;}
.ex .tm.done{color:#4fc3f7;}

/* 套餐切换标签 */
.pt{display:flex;gap:5px;margin-bottom:16px;}
.pt .b{flex-shrink:0;padding:5px 11px;border-radius:16px;font-size:11px;background:#1a2b3c;border:1px solid #1f3348;color:#8aa0b8;cursor:pointer;transition:.12s;white-space:nowrap;}
.pt .b:active{background:#2d4c6e;}
.pt .b.ac{background:#2d4c6e;border-color:#4fc3f7;color:#4fc3f7;}

/* 使用说明 */
.us{background:#1a2b3c;border-radius:10px;padding:10px;border:1px solid #1f3348;font-size:12px;}
.us .ut{color:#8aa0b8;margin-bottom:4px;font-weight:600;}
.us .ud{color:#7a94b0;line-height:1.6;}

/* 本周 */
.wl{display:flex;gap:4px;justify-content:center;margin-top:6px;}
.wl div{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;background:#1a2b3c;color:#5a7a98;}
.wl .dn{background:#2d4c6e;color:#4fc3f7;}
.wl .td{border:2px solid #4fc3f7;color:#4fc3f7;}

/* ===== 跟练页 ===== */
.top{display:flex;align-items:center;padding:14px 16px;gap:10px;border-bottom:1px solid #1f3348;flex-shrink:0;}
.top .bk{font-size:18px;cursor:pointer;opacity:.7;flex-shrink:0;}
.top .mid{flex:1;font-size:16px;font-weight:600;text-align:center;}
.top .rid{font-size:12px;color:#7a94b0;min-width:40px;text-align:right;}

.fl2{flex:1;display:flex;flex-direction:column;align-items:center;padding:14px 16px;overflow-y:auto;}

/* 练习名+信息 */
.ei{display:flex;flex-direction:column;align-items:center;margin-bottom:10px;flex-shrink:0;}
.ei .en{font-size:20px;font-weight:700;}
.ei .info{font-size:11px;color:#5a7a98;margin-top:1px;}

/* 步骤编号+名称（在画布上方） */
.step-label{font-size:11px;color:#5a7a98;margin-bottom:4px;flex-shrink:0;}
.step-label .sn{display:inline;color:#7a94b0;}
.step-label .st{display:inline;color:#c8d6e5;margin-left:4px;}
.step-label .st .hl{color:#4fc3f7;}

/* 呼吸指示（画布上方） */
.br{font-size:12px;color:#5a7a98;margin-bottom:4px;flex-shrink:0;}
.br .i{color:#4fc3f7;font-weight:600;}
.br .e{color:#a5d6a7;font-weight:600;}

/* 画布 */
.cw{width:200px;height:200px;background:#1a2b3c;border-radius:14px;position:relative;box-shadow:0 4px 20px rgba(0,0,0,.3);margin-bottom:6px;flex-shrink:0;}
#pc{width:100%;height:100%;display:block;}
.pt{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;}
.pt .pn{font-size:32px;font-weight:200;color:#4fc3f7;line-height:1;}
.pt .pl{font-size:10px;color:#5a7a98;}

/* 步骤指示点（画布下方） */
.sd{display:flex;gap:5px;justify-content:center;margin-bottom:10px;flex-shrink:0;}
.sd div{width:6px;height:6px;border-radius:50%;background:#1f3348;transition:.25s;}
.sd .act{background:#4fc3f7;transform:scale(1.15);}
.sd .dn{background:#a5d6a7;}

/* 步骤卡片（最下方，推到底部） */
.sc{margin-top:auto;width:100%;max-width:340px;background:#1a2b3c;border-radius:12px;padding:12px 14px;margin-bottom:6px;border:1px solid #1f3348;flex-shrink:0;}
.sc .hint{font-size:11px;color:#8aa0b8;margin-top:5px;border-left:2px solid #2d4c6e;padding-left:10px;}
.sc .hint .tag2{display:inline-block;background:#2d4c6e;padding:1px 6px;border-radius:3px;margin-top:3px;font-size:10px;color:#a0c4e8;}

.act{width:100%;max-width:340px;display:flex;gap:8px;flex-shrink:0;flex-direction:column;padding-bottom:4px;}
.act .r1{display:flex;gap:8px;}
.act .r1 .b{flex:1;padding:14px;border:none;border-radius:11px;font-size:14px;font-weight:600;cursor:pointer;text-align:center;transition:.12s;}
.act .r1 .b:active{transform:scale(.97);}
.bp{background:linear-gradient(135deg,#4fc3f7,#29b6f6);color:#0f1923;}
.bp:disabled{opacity:.3;cursor:not-allowed;transform:none;}
.bs{background:#1f3348;color:#8aa0b8;}
.bo{width:100%;padding:12px;border:1px solid #2d4c6e;border-radius:11px;background:transparent;color:#8aa0b8;cursor:pointer;font-size:14px;font-weight:600;text-align:center;transition:.12s;}
.bo:active{background:#1f3348;}

/* 弹窗 */
.ol, .cf{display:none;position:fixed;inset:0;z-index:100;align-items:center;justify-content:center;}
.ol.show,.cf.show{display:flex;}
.ol{background:rgba(15,25,35,.95);flex-direction:column;gap:12px;}
.ol .oi{font-size:48px;}
.ol .ot{font-size:20px;font-weight:700;color:#a5d6a7;text-align:center;}
.ol .os{font-size:12px;color:#7a94b0;text-align:center;line-height:1.5;max-width:260px;}
.ol .od{font-size:11px;color:#5a7a98;text-align:center;line-height:1.6;}

.ol-btn{display:flex;gap:10px;width:100%;max-width:280px;padding:0 20px;}
.ol-btn .b{flex:1;padding:14px;border:none;border-radius:11px;font-size:14px;font-weight:600;cursor:pointer;text-align:center;}

.cf{background:rgba(15,25,35,.92);}
.cf .bx{background:#1a2b3c;border-radius:16px;padding:20px 24px;border:1px solid #1f3348;text-align:center;max-width:280px;}
.cf .bx .ct{font-size:16px;font-weight:600;margin-bottom:4px;}
.cf .bx .cs{font-size:12px;color:#7a94b0;margin-bottom:14px;}
.cf .bx .cr{display:flex;gap:10px;}
.cf .bx .cr .b{flex:1;padding:11px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;}
</style>
</head>
<body>

<div class="page active" id="pH">
  <div class="fl">
    <div class="hd">🧠 神经训练</div>
    <div class="hs" id="gr">🌅 早上好，茂懿</div>

    <div class="pc">
      <div class="r"><span>今日完成</span><span class="n" id="pgN">0 / 3</span></div>
      <div class="pb"><div class="f" id="pgB" style="width:0%"></div></div>
      <div class="t2" id="pgT">点击练习开始</div>
    </div>

    <div class="plh" id="plT">☀️ 早晨套餐</div>

    <div class="el" id="exL"></div>

    <div class="pt" id="ptTabs"></div>

    <div class="us">
      <div class="ut">💡 使用说明</div>
      <div class="ud">每个练习可跟练（有步骤引导），也可自由做（做完点"我做完了"）。熟练后无需每次都跟练。</div>
    </div>
  </div>
</div>

<div class="page" id="pP">
  <div class="top">
    <span class="bk" onclick="cfExit()">✕</span>
    <span class="mid" id="pTi">练习</span>
    <span class="rid" id="pPd"></span>
  </div>
  <div class="fl2">

    <div class="ei">
      <div class="en" id="pEn">⛏️ 交叉爬行</div>
      <div class="info" id="pInfo">原始反射整合 · 约2分钟</div>
    </div>

    <div class="step-label">
      <span class="sn" id="pSn">准备</span>
      <span class="st" id="pSt"></span>
    </div>

    <div class="br" id="pBr">🌬️</div>

    <div class="cw">
      <canvas id="pc" width="200" height="200"></canvas>
      <div class="pt"><div class="pn" id="pTim"></div><div class="pl" id="pTimL"></div></div>
    </div>

    <div class="sd" id="pDt"></div>

    <div class="sc">
      <div class="hint" id="pSh"></div>
    </div>

    <div class="act">
      <div class="r1">
        <button class="b bs" onclick="resetP()">🔄 重来</button>
        <button class="b bp" id="pBtn">▶ 开始</button>
      </div>
      <button class="bo" onclick="doneP()">✅ 我做完了（跳过跟练）</button>
    </div>
  </div>
</div>

<div class="ol" id="ol">
  <div class="oi">🎉</div>
  <div class="ot" id="olT">完成！</div>
  <div class="os" id="olS"></div>
  <div class="od" id="olD"></div>
  <div class="ol-btn">
    <button class="b bs" onclick="clOl();goH()">🏠 首页</button>
    <button class="b bp" onclick="clOl();goH()">📋 继续任务</button>
  </div>
</div>

<div class="cf" id="cf">
  <div class="bx">
    <div class="ct">退出练习？</div>
    <div class="cs">进度不会丢失，下次继续</div>
    <div class="cr">
      <button class="b bs" onclick="clCf()" style="background:#1f3348;color:#8aa0b8;">留在这里</button>
      <button class="b bp" onclick="doExit()" style="background:linear-gradient(135deg,#4fc3f7,#29b6f6);color:#0f1923;">退出</button>
    </div>
  </div>
</div>

<script>
const EX = [
  {i:'yawn',n:'打哈欠激活',ic:'🥱',t:'30s',c:'预备',
    s:[{t:'用力打一个真正的哈欠',h:'假打也能变成真打',d:0},{t:'捏住鼻子闭嘴呼气',h:'不出气',d:8},{t:'松开深呼吸一次',h:'',d:6},{t:'最后一次深呼吸',h:'',d:6}]},
  {i:'ear',n:'耳朵拉拽',ic:'👂',t:'30s',c:'预备',
    s:[{t:'从耳朵上端向下轻拉',h:'',d:8},{t:'换另一只耳朵',h:'',d:8},{t:'两只耳朵同时拉',h:'',d:6},{t:'揉一揉放松',h:'',d:4}]},
  {i:'shake',n:'全身抖动',ic:'💃',t:'1min',c:'预备',
    s:[{t:'站起来从手开始甩',h:'',d:8},{t:'手臂一起甩',h:'',d:8},{t:'全身都抖起来',h:'',d:12},{t:'慢慢停下深呼吸',h:'',d:6}]},
  {i:'starfish',n:'海星呼吸',ic:'🦑',t:'2min',c:'反射整合',cy:5,
    s:[{t:'仰卧躺平手脚展开',h:'',d:0},{t:'慢慢吸气手脚向外展开',h:'像海星张开',d:4},{t:'屏住呼吸保持展开',h:'',d:2},{t:'慢慢呼气手脚收回胸前',h:'抱胸弯腿',d:6},{t:'放松休息一下',h:'',d:3}]},
  {i:'crawl',n:'交叉爬行',ic:'⛏️',t:'2min',c:'反射整合',
    s:[{t:'抬右手时抬左膝',h:'慢慢来',d:15},{t:'抬左手时抬右膝',h:'',d:15},{t:'加快速度交替',h:'',d:15},{t:'放慢最后5次',h:'',d:10}]},
  {i:'snow',n:'雪天使',ic:'❄️',t:'2min',c:'反射整合',
    s:[{t:'仰卧手臂放两侧',h:'脊椎贴地',d:0},{t:'呼气手臂滑向头顶',h:'',d:6},{t:'吸气手臂滑回',h:'',d:6},{t:'重复：呼上吸下',h:'保持慢速',d:24},{t:'最后一次放松',h:'',d:6}]},
  {i:'ball',n:'球上平衡',ic:'🏐',t:'2min',c:'反射整合',no:'需瑜伽球',
    s:[{t:'趴在球上手脚撑地',h:'',d:0},{t:'轻轻前后滚',h:'',d:20},{t:'试着举手平衡',h:'',d:16},{t:'慢慢停下深呼吸',h:'',d:8}]},
  {i:'spin',n:'旋转脱敏',ic:'🌀',t:'2min',c:'前庭-小脑',
    s:[{t:'闭眼原地转3圈',h:'',d:12},{t:'停下来看固定点',h:'',d:8},{t:'再闭眼转3圈',h:'',d:10},{t:'看固定点',h:'',d:8},{t:'深呼吸2次',h:'',d:6}]},
  {i:'oneLeg',n:'单脚站',ic:'🦩',t:'2min',c:'前庭-小脑',
    s:[{t:'叉腰左脚抬起',h:'',d:15},{t:'换右脚',h:'',d:15},{t:'左脚闭眼试试',h:'',d:10},{t:'右脚闭眼',h:'',d:10},{t:'放松抖抖腿',h:'',d:6}]},
  {i:'bounce',n:'弹跳训练',ic:'🏀',t:'2min',c:'前庭-小脑',no:'有蹦床更佳',
    s:[{t:'原地自由弹跳',h:'',d:20},{t:'跳高摸墙',h:'',d:20},{t:'边跳边拍手',h:'',d:15},{t:'慢慢停下深呼吸',h:'',d:8}]},
  {i:'bee',n:'蜜蜂呼吸',ic:'🐝',t:'2min',c:'迷走神经',
    s:[{t:'坐直闭眼',h:'',d:0},{t:'深吸一口气',h:'',d:4},{t:'呼气时嗡嗡嗡——',h:'感受震动',d:8},{t:'深呼吸再来一次',h:'',d:4},{t:'呼气嗡——',h:'',d:8},{t:'最后一次深呼吸',h:'',d:4},{t:'呼气嗡——睁眼',h:'',d:10}]},
  {i:'cold',n:'冷水唤醒',ic:'❄️',t:'1min',c:'迷走神经',no:'洗漱时做',
    s:[{t:'冷水拍脸颊眼周',h:'',d:8},{t:'冷水拍脖子前侧',h:'',d:6},{t:'深吸气缓慢呼出',h:'',d:8},{t:'深呼吸第二次',h:'',d:8},{t:'深呼吸第三次',h:'',d:8}]},
  {i:'yawn2',n:'哈欠深呼吸',ic:'😮',t:'1min',c:'迷走神经',
    s:[{t:'张嘴打一个大哈欠',h:'',d:6},{t:'用力吞咽口水',h:'',d:4},{t:'伸个懒腰',h:'',d:6},{t:'再打哈欠再吞咽',h:'',d:6},{t:'深呼吸放松',h:'',d:6}]},
  {i:'finger',n:'指尖对碰',ic:'🤏',t:'2min',c:'精细运动',
    s:[{t:'拇指依次碰食中无名小指',h:'右手先做',d:12},{t:'换左手',h:'',d:12},{t:'左右手同时',h:'',d:12},{t:'闭眼再做',h:'',d:12},{t:'抖抖手放松',h:'',d:4}]},
  {i:'rubber',n:'橡皮筋拉伸',ic:'🪢',t:'2min',c:'精细运动',no:'需橡皮筋',
    s:[{t:'指尖套橡皮筋',h:'',d:0},{t:'拇指食指撑开',h:'',d:12},{t:'拇指中指撑开',h:'',d:12},{t:'拇指无名指撑开',h:'',d:12},{t:'拇指小指撑开',h:'',d:12},{t:'换左手重复',h:'',d:20}]},
];

const PL = [
  {i:'morning',ic:'☀️',n:'早晨套餐',ids:['cold','bee','crawl']},
  {i:'am',ic:'🌤️',n:'上午套餐',ids:['starfish','oneLeg','finger']},
  {i:'pm',ic:'🏃',n:'下午套餐',ids:['snow','ball','spin','bee']},
  {i:'night',ic:'🌙',n:'睡前套餐',ids:['snow','starfish','yawn2']},
];

function ex(i){return EX.find(x=>x.i===i);}
let St={pi:0,dn:[],ex:null,cy:1,cs:1,st:-1,ss:[],pl:false,ti:null,rm:0};

function rH(){
  const p=PL[St.pi];
  document.getElementById('plT').textContent=p.ic+' '+p.n;
  document.getElementById('ptTabs').innerHTML=PL.map((x,i)=>`<div class="b ${i===St.pi?'ac':''}" onclick="St.pi=${i};rH()">${x.ic} ${x.n}</div>`).join('');
  const l=document.getElementById('exL');
  l.innerHTML=p.ids.map(id=>{const x=ex(id);if(!x)return'';const dn=St.dn.includes(id);
    return`<div class="ex ${dn?'done':''}" onclick="sX('${id}')">
      <div class="ck">${dn?'✓':''}</div><div class="ic">${x.ic}</div>
      <div class="in"><div class="nm">${x.n}</div><div class="sub">${x.no||x.c} · ${x.t}</div></div>
      <div class="tm ${dn?'done':''}">${dn?'✅ 已完成':x.t}</div></div>`;
  }).join('');
  upPr();
}

function upPr(){
  const p=PL[St.pi];const t=p.ids.length;const d=p.ids.filter(id=>St.dn.includes(id)).length;
  document.getElementById('pgN').textContent=`${d} / ${t}`;
  document.getElementById('pgB').style.width=`${t>0?d/t*100:0}%`;
  const doneNames=p.ids.filter(id=>St.dn.includes(id)).map(id=>{const x=ex(id);return x?x.ic+x.n:'';}).filter(Boolean);
  document.getElementById('pgT').textContent=d===t?'🎉 全部完成！':(doneNames.length?'✅ '+doneNames.join(' · '):'点击练习开始');
}

function sX(id){
  const x=ex(id);if(!x)return;
  St.ex=x;St.cs=x.cy||1;St.cy=1;St.st=-1;St.ss=x.s;St.pl=false;
  if(St.ti){clearInterval(St.ti);St.ti=null;}
  document.getElementById('pEn').textContent=x.ic+' '+x.n;
  document.getElementById('pInfo').textContent=x.c+' · 约'+x.t;
  document.getElementById('pH').classList.remove('active');
  document.getElementById('pP').classList.add('active');
  uPpd();uP();
}

function uPpd(){
  const p=PL[St.pi];const d=p.ids.filter(id=>St.dn.includes(id)).length;
  document.getElementById('pPd').textContent=`${d}/${p.ids.length}`;
}

function uP(){
  if(!St.ex)return;
  const x=St.ex;const m=St.cs>1;
  const sn=document.getElementById('pSn'),st=document.getElementById('pSt');
  const br=document.getElementById('pBr'),tn=document.getElementById('pTim'),tl=document.getElementById('pTimL');
  const btn=document.getElementById('pBtn');

  if(St.st===-1){
    sn.textContent='准备';
    st.innerHTML=(m?`第${St.cy}/${St.cs}轮 · `:'')+St.ss[0].t;
    document.getElementById('pSh').innerHTML=St.ss[0].h?`💡 ${St.ss[0].h}`:'';
    br.innerHTML='🌬️';tn.textContent='';tl.textContent='';
    btn.textContent='▶ 开始';btn.disabled=false;
    dr(0.1);rD(1,0);return;
  }
  const s=St.ss[St.st];
  sn.textContent=(m?`第${St.cy}轮·`:'')+`步${St.st+1}/${St.ss.length}`;
  st.innerHTML=s.t;
  document.getElementById('pSh').innerHTML=(s.h?`💡 ${s.h}`:'')+(x.no&&St.st===0?`<br><span class="tag2">📌 ${x.no}</span>`:'');
  const txt=s.t;
  if(txt.includes('吸气'))br.innerHTML='🌬️ <span class="i">吸气 ↑</span>';
  else if(txt.includes('呼气'))br.innerHTML='🌬️ <span class="e">呼气 ↓</span>';
  else br.innerHTML='🌬️';
  if(s.d>0){tn.textContent=St.pl?St.rm:s.d;tl.textContent='秒';}else{tn.textContent='';tl.textContent='';}
  const tt=St.ss.length*St.cs;const dn=(St.cy-1)*St.ss.length+St.st;const p=Math.min(100,dn/tt*100);
  if(m)rD(St.cs,St.cy-1);else rD(St.ss.length,St.st);
  if(St.pl){btn.textContent='⏳ 进行中...';btn.disabled=true;}else{btn.textContent='▶ 下一步';btn.disabled=false;}
  let r=0.1;if(St.st>=1&&St.st<=2)r=St.pl?0.3+0.7*(1-St.rm/s.d):1;
  dr(Math.max(0.1,Math.min(1,r)));
}

function rD(n,a){const c=document.getElementById('pDt');
  c.innerHTML=Array.from({length:n},(_,i)=>{let cl='';if(i<a)cl=' dn';else if(i===a)cl=' act';return`<div class="${cl}"></div>`;}).join('');}

function dr(sp){
  const c=document.getElementById('pc'),ctx=c.getContext('2d');
  const w=c.width,h=c.height,cx=w/2,cy=h/2;ctx.clearRect(0,0,w,h);
  const aa=30+60*sp,la=15+40*sp;
  ctx.beginPath();ctx.arc(cx,cy,80,0,Math.PI*2);ctx.fillStyle='rgba(79,195,247,0.04)';ctx.fill();
  const hy=cy-48-10*(1-sp);ctx.save();
  ctx.beginPath();ctx.ellipse(cx,hy+30,12,22,0,0,Math.PI*2);ctx.fillStyle='#4fc3f7';ctx.fill();
  ctx.beginPath();ctx.arc(cx,hy,15,0,Math.PI*2);ctx.fillStyle='#4fc3f7';ctx.fill();
  ctx.fillStyle='#0f1923';ctx.beginPath();ctx.arc(cx-4,hy-1,2,0,Math.PI*2);ctx.arc(cx+4,hy-1,2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(cx,hy+4,5,0.1*Math.PI,0.9*Math.PI);ctx.strokeStyle='#0f1923';ctx.lineWidth=1.5;ctx.stroke();
  const sy=hy+16;ctx.strokeStyle='#4fc3f7';ctx.lineWidth=7;ctx.lineCap='round';
  let lx=cx-12-60*Math.cos((90-aa)*Math.PI/180)*sp;let ly=sy-8+60*Math.sin((90-aa)*Math.PI/180)*sp;
  ctx.beginPath();ctx.moveTo(cx-12,sy);ctx.lineTo(lx,ly);ctx.stroke();
  let rx=cx+12+60*Math.cos((90-aa)*Math.PI/180)*sp;let ry=sy-8+60*Math.sin((90-aa)*Math.PI/180)*sp;
  ctx.beginPath();ctx.moveTo(cx+12,sy);ctx.lineTo(rx,ry);ctx.stroke();
  const hy2=hy+50;lx=cx-6-45*Math.cos((90-la)*Math.PI/180)*sp;ly=hy2+45*Math.sin((90-la)*Math.PI/180)*sp;
  ctx.beginPath();ctx.moveTo(cx-6,hy2);ctx.lineTo(lx,ly);ctx.stroke();
  rx=cx+6+45*Math.cos((90-la)*Math.PI/180)*sp;ry=hy2+45*Math.sin((90-la)*Math.PI/180)*sp;
  ctx.beginPath();ctx.moveTo(cx+6,hy2);ctx.lineTo(rx,ry);ctx.stroke();ctx.restore();
}

document.getElementById('pBtn').addEventListener('click',()=>{
  if(!St.ex)return;
  if(St.st===-1){St.st=0;St.cy=1;uP();if(St.ss[0]&&St.ss[0].d>0)sT();return;}
  if(!St.pl)sT();
});

function sT(){const s=St.ss[St.st];if(!s||s.d<=0){ad();return;}St.rm=s.d;St.pl=true;uP();
  St.ti=setInterval(()=>{St.rm--;uP();if(St.rm<=0){clearInterval(St.ti);St.ti=null;St.pl=false;ad();}},1000);}
function ad(){St.st++;St.pl=false;
  if(St.st>=St.ss.length){if(St.cy>=St.cs){fEx();return;}St.cy++;St.st=0;}
  uP();if(St.st<St.ss.length&&St.ss[St.st].d>0)sT();}
function doneP(){fEx();}
function fEx(){
  const id=St.ex.i;if(!St.dn.includes(id))St.dn.push(id);
  svD();const p=PL[St.pi];const ad=p.ids.every(xid=>St.dn.includes(xid));
  document.getElementById('ol').classList.add('show');
  document.getElementById('olT').textContent=`${St.ex.ic} ${St.ex.n} 完成！`;
  document.getElementById('olS').textContent=ad?'🎉 今日全部完成！茂懿真棒！':'继续加油，还有练习等着你 💪';
  const det=p.ids.map(id=>{const x=ex(id);const dn=St.dn.includes(id);return (dn?'✅':'⬜')+' '+(x?x.ic+x.n:'')}).join('<br>');
  const d=p.ids.filter(id=>St.dn.includes(id)).length;
  document.getElementById('olD').innerHTML='今日进度：'+d+'/'+p.ids.length+'<br>'+det;
}
function resetP(){clOl();if(St.ti){clearInterval(St.ti);St.ti=null;}if(St.ex){St.st=-1;St.cy=1;St.pl=false;St.rm=0;uP();}}
function clOl(){document.getElementById('ol').classList.remove('show');}
function goH(){clOl();clCf();if(St.ti){clearInterval(St.ti);St.ti=null;}document.getElementById('pP').classList.remove('active');document.getElementById('pH').classList.add('active');rH();}
function cfExit(){document.getElementById('cf').classList.add('show');}
function clCf(){document.getElementById('cf').classList.remove('show');}
function doExit(){clCf();goH();}
function svD(){localStorage.setItem('nd_'+dk(),JSON.stringify(St.dn));}
function dk(){const d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
St.dn=(()=>{try{const r=localStorage.getItem('nd_'+dk());if(r)return JSON.parse(r);}catch(e){}return[];})();
rH();
</script>
