<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>✅ 每日打卡</title>
<style>
/* ===== 根字体随屏幕宽度缩放 ===== */
html{font-size:calc(100vw / 375 * 16);}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100dvh;}
body{font-family:-apple-system,'PingFang SC','Noto Sans SC',sans-serif;background:#f5f7fa;color:#2c3e50;display:flex;flex-direction:column;overflow:hidden;overscroll-behavior:none;touch-action:manipulation;}

/* ===== 页面容器 ===== */
.page{display:none;flex-direction:column;min-height:100dvh;}
.page.active{display:flex;}

/* ===== 首页 ===== */
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:1rem 1.25rem 2rem;-webkit-overflow-scrolling:touch;}
.title{font-size:1.625rem;font-weight:700;margin-bottom:.25rem;}
.hello{font-size:.9375rem;color:#5a7a98;margin-bottom:.75rem;display:flex;align-items:center;gap:.375rem;}
.hello .ne-btn{font-size:.75rem;opacity:.4;cursor:pointer;padding:.125rem .25rem;border-radius:.25rem;transition:.12s;}
.hello .ne-btn:active{opacity:1;background:#e0e6ed;}

/* 进度卡片 */
.pc{background:#ffffff;border-radius:.875rem;padding:1rem;margin-bottom:.875rem;border:1px solid #e0e6ed;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.pc .r{display:flex;justify-content:space-between;font-size:.8125rem;color:#6a7a90;margin-bottom:.375rem;}
.pc .r .n{color:#4fc3f7;font-size:1.125rem;font-weight:700;}
.pb{height:.375rem;background:#e0e6ed;border-radius:.1875rem;overflow:hidden;margin-bottom:.375rem;}
.pb .f{height:100%;background:linear-gradient(90deg,#4fc3f7,#81d4fa);border-radius:.1875rem;transition:width .4s;}
.pc .sub{font-size:.8125rem;color:#6a7a90;}

/* 练习列表 */
.el{display:flex;flex-direction:column;gap:.5rem;}
.ex{display:flex;align-items:center;gap:.75rem;padding:.875rem;border-radius:.625rem;background:#ffffff;border:1px solid #e0e6ed;cursor:pointer;transition:.12s;box-shadow:0 1px 2px rgba(0,0,0,.03);}
.ex:active{background:#f0f4f8;transform:scale(.98);}
.ex .ck{width:1.375rem;height:1.375rem;border-radius:50%;border:2px solid #c8d6e0;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.6875rem;color:#4fc3f7;}
.ex.done .ck{border-color:#4fc3f7;background:rgba(79,195,247,.1);}
.ex .ic{font-size:1.25rem;width:1.75rem;text-align:center;flex-shrink:0;}
.ex .inf{flex:1;font-size:.9375rem;font-weight:600;}
.ex .inf .s{font-size:.8125rem;font-weight:400;color:#7a8a9a;}
.ex .tm{font-size:.8125rem;color:#7a8a9a;flex-shrink:0;}
.ex .tm.done{color:#4fc3f7;}
.ex .tp{font-size:.6875rem;background:#e8f0fe;color:#4a7a9a;padding:.0625rem .375rem;border-radius:.25rem;flex-shrink:0;}

/* 底部管理入口 */
.mg-entry{display:flex;gap:.5rem;margin-top:.75rem;justify-content:center;}
.mg-entry button{flex:1;max-width:9rem;padding:.625rem;border-radius:.625rem;border:1px solid #e0e6ed;background:#ffffff;color:#6a7a90;font-size:.8125rem;cursor:pointer;transition:.12s;}
.mg-entry button:active{background:#f0f4f8;color:#5a7a98;}

/* 标签按钮 */
.tags{display:flex;gap:.375rem;margin-bottom:.875rem;overflow-x:auto;}
.tags::-webkit-scrollbar{display:none;}
.tagb{flex-shrink:0;padding:.4375rem .875rem;border-radius:1.25rem;font-size:.8125rem;background:#ffffff;border:1px solid #e0e6ed;color:#5a7a98;cursor:pointer;white-space:nowrap;}
.tagb:active{background:#e3f2fd;}
.tagb.ac{background:#e3f2fd;border-color:#4fc3f7;color:#4fc3f7;}

/* 使用说明 */
.us{background:#ffffff;border-radius:.625rem;padding:.75rem .875rem;border:1px solid #e0e6ed;font-size:.8125rem;color:#6a7a90;margin-top:.875rem;line-height:1.6;}
.us .ut{color:#4a5a6a;font-weight:600;margin-bottom:.25rem;}

/* ===== 顶栏 ===== */
.top{display:flex;align-items:center;padding:.875rem 1.125rem;gap:.625rem;border-bottom:1px solid #e0e6ed;font-size:.875rem;flex-shrink:0;background:#ffffff;}
.top .bk{font-size:1.25rem;opacity:.7;cursor:pointer;}
.top .mi{flex:1;text-align:center;font-weight:600;font-size:1rem;}
.top .ri{color:#6a7a90;font-size:.875rem;min-width:2.5rem;text-align:right;}

/* ===== 跟练页 ===== */
.p-inner{flex:1;display:flex;flex-direction:column;align-items:center;padding:1.25rem;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}

.ei{text-align:center;margin-bottom:.25rem;flex-shrink:0;}
.ei .en{font-size:1.375rem;font-weight:700;}
.ei .inf{font-size:.8125rem;color:#7a8a9a;}

.sn{font-size:.8125rem;color:#7a8a9a;flex-shrink:0;margin-bottom:.75rem;}
.sn .st{color:#2c3e50;margin-left:.25rem;}

/* 独立倒计时（无画布） */
.tm-lg{text-align:center;flex-shrink:0;margin-bottom:.75rem;}
.tm-lg .n{font-size:3.25rem;font-weight:200;color:#4fc3f7;line-height:1;}
.tm-lg .l{font-size:1rem;color:#7a8a9a;margin-top:.25rem;}

/* 步骤点 */
.dots{display:flex;gap:.375rem;flex-shrink:0;margin:.25rem 0;}
.dots div{width:.5rem;height:.5rem;border-radius:50%;background:#d0d8e0;transition:.2s;}
.dots .act{background:#4fc3f7;transform:scale(1.2);}
.dots .dn{background:#a5d6a7;}

/* 步骤卡片 */
.sc{width:100%;background:#ffffff;border-radius:.75rem;padding:.875rem 1rem;border:1px solid #e0e6ed;font-size:.8125rem;color:#5a7a98;flex-shrink:0;box-shadow:0 1px 2px rgba(0,0,0,.03);}
.sc .tg2{display:inline-block;background:#e3f2fd;padding:.125rem .5rem;border-radius:.25rem;margin-top:.25rem;font-size:.75rem;color:#4a7a9a;}

/* 底部区域 */
.bot{width:100%;max-width:21.25rem;display:flex;flex-direction:column;gap:.5rem;flex-shrink:0;padding-bottom:.5rem;margin-top:.5rem;}

/* 按钮 */
.act{width:100%;display:flex;flex-direction:column;gap:.5rem;flex-shrink:0;}
.act .r1{display:flex;gap:.5rem;}
.act .r1 .b{flex:1;padding:.9375rem;border:none;border-radius:.75rem;font-size:.9375rem;font-weight:600;text-align:center;cursor:pointer;transition:.12s;}
.act .r1 .b:active{transform:scale(.97);}
.bp{background:linear-gradient(135deg,#4fc3f7,#29b6f6);color:#ffffff;}
.bp:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.bs{background:#e8f0fe;color:#4a6a8a;}
.bo{padding:.875rem;border-radius:.75rem;border:1px solid #c8d6e0;background:transparent;color:#5a7a98;font-size:.9375rem;font-weight:600;text-align:center;cursor:pointer;transition:.12s;}
.bo:active{background:#f0f4f8;}

/* 全宽主按钮 */
.btn-full{width:100%;padding:.9375rem;border:none;border-radius:.75rem;font-size:1.0625rem;font-weight:600;text-align:center;cursor:pointer;transition:.12s;}

/* ===== 弹窗 ===== */
.ol,.cf{display:none;position:fixed;inset:0;z-index:100;align-items:center;justify-content:center;}
.ol.show,.cf.show{display:flex;}
.ol{background:rgba(245,247,250,.95);flex-direction:column;gap:.75rem;}
.ol .oi{font-size:3.5rem;}
.ol .ot{font-size:1.25rem;font-weight:700;color:#66bb6a;text-align:center;}
.ol .os{font-size:.875rem;color:#6a7a90;text-align:center;max-width:18.75rem;}
.ol .od{font-size:.8125rem;color:#7a8a9a;text-align:center;line-height:1.6;}
.ol-btn{display:flex;gap:.625rem;width:18.75rem;padding:0;}
.ol-btn .b{flex:1;padding:.875rem;border:none;border-radius:.75rem;font-size:.9375rem;font-weight:600;cursor:pointer;text-align:center;}

.cf{background:rgba(245,247,250,.92);}
.cf .bx{background:#ffffff;border-radius:1rem;padding:1.75rem 1.5rem;border:1px solid #e0e6ed;text-align:center;max-width:18.75rem;box-shadow:0 4px 12px rgba(0,0,0,.08);}
.cf .bx .ct{font-size:1.125rem;font-weight:600;margin-bottom:.375rem;}
.cf .bx .cs{font-size:.8125rem;color:#6a7a90;margin-bottom:1rem;}
.cf .bx .cr{display:flex;gap:.625rem;}
.cf .bx .cr .b{flex:1;padding:.75rem;border:none;border-radius:.625rem;font-size:.9375rem;font-weight:600;cursor:pointer;}

/* ===== 姓名编辑弹窗 ===== */
.ne{display:none;position:fixed;inset:0;z-index:110;align-items:center;justify-content:center;background:rgba(245,247,250,.92);}
.ne.show{display:flex;}
.ne .bx{background:#ffffff;border-radius:1rem;padding:1.75rem 1.5rem;border:1px solid #e0e6ed;text-align:center;max-width:18.75rem;width:85%;box-shadow:0 4px 12px rgba(0,0,0,.08);}
.ne .bx .ct{font-size:1.125rem;font-weight:600;margin-bottom:.5rem;}
.ne .bx .ni{width:100%;padding:.6875rem .75rem;border-radius:.5rem;border:1px solid #c8d6e0;background:#f5f7fa;color:#2c3e50;font-size:.9375rem;text-align:center;margin-bottom:1rem;outline:none;}
.ne .bx .ni:focus{border-color:#4fc3f7;box-shadow:0 0 0 2px rgba(79,195,247,.15);}
.ne .bx .cr{display:flex;gap:.625rem;}
.ne .bx .cr .b{flex:1;padding:.75rem;border:none;border-radius:.625rem;font-size:.9375rem;font-weight:600;cursor:pointer;}

/* ===== 删除确认弹窗 ===== */
.dc{display:none;position:fixed;inset:0;z-index:120;align-items:center;justify-content:center;background:rgba(245,247,250,.92);}
.dc.show{display:flex;}
.dc .bx{background:#ffffff;border-radius:1rem;padding:1.75rem 1.5rem;border:1px solid #e0e6ed;text-align:center;max-width:18.75rem;box-shadow:0 4px 12px rgba(0,0,0,.08);}
.dc .bx .ct{font-size:1.125rem;font-weight:600;margin-bottom:.375rem;}
.dc .bx .cs{font-size:.8125rem;color:#6a7a90;margin-bottom:1rem;}
.dc .bx .cr{display:flex;gap:.625rem;}
.dc .bx .cr .b{flex:1;padding:.75rem;border:none;border-radius:.625rem;font-size:.9375rem;font-weight:600;cursor:pointer;}

/* ===== 时段安排编辑弹窗 ===== */
.se{display:none;position:fixed;inset:0;z-index:115;align-items:center;justify-content:center;background:rgba(245,247,250,.92);}
.se.show{display:flex;}
.se .bx{background:#ffffff;border-radius:1rem;padding:1.5rem;border:1px solid #e0e6ed;max-width:20rem;width:90%;box-shadow:0 4px 12px rgba(0,0,0,.08);max-height:85dvh;display:flex;flex-direction:column;}
.se .bx .st{font-size:1.125rem;font-weight:600;margin-bottom:.5rem;text-align:center;flex-shrink:0;}
.se .bx .ss{font-size:.8125rem;color:#6a7a90;margin-bottom:.75rem;text-align:center;flex-shrink:0;}
.se .bx .sl{flex:1;overflow-y:auto;margin-bottom:.75rem;}
.se .bx .sl .si{display:flex;align-items:center;gap:.625rem;padding:.5rem .625rem;border-radius:.5rem;margin-bottom:.25rem;cursor:pointer;transition:.12s;}
.se .bx .sl .si:active{background:#f0f4f8;}
.se .bx .sl .si .cb{width:1.25rem;height:1.25rem;border-radius:50%;border:2px solid #c8d6e0;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.625rem;color:#4fc3f7;transition:.12s;}
.se .bx .sl .si.chk .cb{border-color:#4fc3f7;background:rgba(79,195,247,.1);}
.se .bx .sl .si .ic{font-size:1rem;width:1.375rem;text-align:center;flex-shrink:0;}
.se .bx .sl .si .nn{font-size:.875rem;flex:1;}
.se .bx .sl .si .tp{font-size:.6875rem;background:#e8f0fe;color:#4a7a9a;padding:.0625rem .375rem;border-radius:.25rem;flex-shrink:0;}
.se .bx .cr{display:flex;gap:.625rem;flex-shrink:0;}
.se .bx .cr .b{flex:1;padding:.75rem;border:none;border-radius:.625rem;font-size:.9375rem;font-weight:600;cursor:pointer;}

/* ===== 管理页 ===== */
.mg-section-title{font-size:.9375rem;font-weight:600;color:#5a7a98;margin-bottom:.625rem;margin-top:1rem;}

/* 管理页 - 项目列表 */
.mg-list{display:flex;flex-direction:column;gap:.5rem;margin-bottom:.875rem;}
.mg-item{display:flex;align-items:center;gap:.625rem;padding:.75rem .875rem;border-radius:.625rem;background:#ffffff;border:1px solid #e0e6ed;}
.mg-item .ic{font-size:1.125rem;width:1.5rem;text-align:center;flex-shrink:0;}
.mg-item .inf{flex:1;font-size:.875rem;}
.mg-item .inf .n{font-weight:600;}
.mg-item .inf .det{font-size:.75rem;color:#7a8a9a;}
.mg-item .mg-acts{display:flex;gap:.25rem;flex-shrink:0;}
.mg-item .mg-acts span{font-size:.8125rem;padding:.25rem .375rem;border-radius:.25rem;cursor:pointer;opacity:.6;transition:.12s;}
.mg-item .mg-acts span:active{opacity:1;background:#f0f4f8;}

/* 管理页 - 时段安排 */
.slots-overview{display:flex;flex-direction:column;gap:.625rem;margin-bottom:.875rem;}
.slot-card{border-radius:.625rem;background:#ffffff;border:1px solid #e0e6ed;padding:.75rem .875rem;}
.slot-card .hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.375rem;}
.slot-card .hdr .icn{font-size:1rem;width:1.5rem;text-align:center;flex-shrink:0;}
.slot-card .hdr .nm{font-size:.9375rem;font-weight:600;flex:1;margin-left:.375rem;}
.slot-card .hdr .edit-btn{font-size:.75rem;padding:.25rem .5rem;border-radius:.375rem;border:none;background:#e3f2fd;color:#4fc3f7;cursor:pointer;font-weight:600;transition:.12s;}
.slot-card .hdr .edit-btn:active{background:#bbdefb;}
.slot-card .items{display:flex;flex-wrap:wrap;gap:.375rem;}
.slot-card .items .tag{font-size:.75rem;background:#f0f4f8;color:#5a7a98;padding:.1875rem .5rem;border-radius:.3125rem;white-space:nowrap;}
.slot-card .empty{font-size:.75rem;color:#9aabba;padding:.125rem 0;}

/* 空状态 */
.empty-state{text-align:center;padding:2rem 0;color:#6a7a90;font-size:.875rem;line-height:1.6;}

/* ===== 编辑器 ===== */
.me-form{display:flex;flex-direction:column;gap:.875rem;}
.me-row{display:flex;flex-direction:column;gap:.25rem;}
.me-row label{font-size:.8125rem;color:#6a7a90;}
.me-input{padding:.6875rem .75rem;border-radius:.5rem;border:1px solid #c8d6e0;background:#f5f7fa;color:#2c3e50;font-size:.9375rem;outline:none;}
.me-input:focus{border-color:#4fc3f7;box-shadow:0 0 0 2px rgba(79,195,247,.15);}
.me-input::placeholder{color:#9aabba;}
select.me-input{appearance:auto;}

.me-type{display:flex;gap:.5rem;}
.me-type-btn{flex:1;padding:.625rem;border-radius:.5rem;text-align:center;border:1px solid #c8d6e0;background:#ffffff;color:#5a7a98;font-size:.875rem;cursor:pointer;transition:.12s;}
.me-type-btn:active{background:#f0f4f8;}
.me-type-btn.ac{background:#e3f2fd;border-color:#4fc3f7;color:#4fc3f7;}

/* 编辑器 - 步骤 */
.steps-title{font-size:.875rem;font-weight:600;color:#5a7a98;margin-top:.5rem;}
.me-step{background:#ffffff;border-radius:.5rem;padding:.75rem;border:1px solid #e0e6ed;margin-bottom:.5rem;}
.me-step .hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:.375rem;}
.me-step .hdr .label{font-size:.75rem;color:#7a8a9a;}
.me-step .hdr .rm{font-size:.75rem;padding:.125rem .375rem;border-radius:.25rem;cursor:pointer;opacity:.5;transition:.12s;color:#ef5350;}
.me-step .hdr .rm:active{opacity:1;background:#fde8e8;}
.me-step .sf{display:flex;flex-direction:column;gap:.375rem;}
.me-step .sf .srow{display:flex;gap:.375rem;align-items:center;}
.me-step .sf .srow input{flex:1;padding:.5rem .625rem;border-radius:.375rem;border:1px solid #c8d6e0;background:#f5f7fa;color:#2c3e50;font-size:.8125rem;outline:none;}
.me-step .sf .srow input:focus{border-color:#4fc3f7;box-shadow:0 0 0 2px rgba(79,195,247,.15);}
.me-step .sf .srow input::placeholder{color:#9aabba;}
.me-step .sf .srow .dur{max-width:4rem;text-align:center;}

.add-step-btn{width:100%;padding:.6875rem;border:1px dashed #c8d6e0;background:transparent;border-radius:.5rem;color:#7a8a9a;font-size:.8125rem;cursor:pointer;transition:.12s;}
.add-step-btn:active{background:#f0f4f8;color:#5a7a98;}
</style>
</head>
<body>

<!-- ========== 首页 ========== -->
<div class="page active" id="pH">
  <div class="scroll">
    <div class="title">✅ 每日打卡</div>
    <div class="hello" id="gr">
      <span id="grTxt">🌅 早上好，小伙伴</span>
      <span class="ne-btn" onclick="openNE()">✏️</span>
    </div>

    <div class="pc">
      <div class="r"><span>今日完成</span><span class="n" id="pgN">0 / 0</span></div>
      <div class="pb"><div class="f" id="pgB" style="width:0%"></div></div>
      <div class="sub" id="pgT">点击打卡项开始</div>
    </div>

    <div class="tags" id="tgS"></div>

    <div class="el" id="exL"></div>

    <div class="mg-entry">
      <button onclick="openMg()">📋 管理打卡项目</button>
      <button onclick="resetToday()">🔄 重置今日</button>
    </div>

    <div class="us">
      <div class="ut">💡 使用说明</div>
      每个打卡项目可设为"跟练型"（有步骤引导）或"纯打卡"（一键完成）。你可以在管理页创建自己的打卡项目，并在时段安排中分配到不同时段。
    </div>
  </div>
</div>

<!-- ========== 跟练页 ========== -->
<div class="page" id="pP">
  <div class="top">
    <span class="bk" onclick="cfExit()">✕</span>
    <span class="mi" id="pTi">练习</span>
    <span class="ri" id="pPd"></span>
  </div>
  <div class="p-inner">

    <div class="ei">
      <div class="en" id="pEn">⛏️ 交叉爬行</div>
      <div class="inf" id="pIf">反射整合 · 约2分钟</div>
    </div>

    <div class="sn"><span id="pSn">准备</span> <span class="st" id="pSt"></span></div>

    <!-- 独立倒计时（无画布） -->
    <div class="tm-lg"><div class="n" id="pTim">—</div><div class="l" id="pTimL">秒</div></div>

    <div class="dots" id="pDt"></div>

    <div class="bot">
      <div class="sc" id="pSc"></div>
      <div class="act">
        <button class="btn-full bp" id="pBtn">▶ 开始</button>
        <div class="r1" id="pExtraBtns">
          <button class="b bs" onclick="resetP()">🔄 重来</button>
          <button class="b bs" onclick="doneP()">✅ 我做完了</button>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- ========== 管理页 ========== -->
<div class="page" id="pM">
  <div class="top">
    <span class="bk" onclick="goH()">✕</span>
    <span class="mi">✅ 打卡管理</span>
    <span class="ri"></span>
  </div>
  <div class="scroll">
    <!-- 项目列表 -->
    <div class="mg-section-title">📋 打卡项目</div>
    <div class="mg-list" id="mgItemList"></div>
    <button class="bo" onclick="openEditor()">➕ 新建打卡项目</button>

    <!-- 时段安排概览 -->
    <div class="mg-section-title">📅 时段安排</div>
    <div class="slots-overview" id="slotOverview"></div>
  </div>
</div>

<!-- ========== 项目编辑器 ========== -->
<div class="page" id="pME">
  <div class="top">
    <span class="bk" onclick="closeEditor()">✕</span>
    <span class="mi" id="meTitle">新建打卡项目</span>
    <span class="ri" onclick="saveItem()" style="color:#4fc3f7;cursor:pointer;">保存</span>
  </div>
  <div class="scroll">
    <div class="me-form">
      <div class="me-row">
        <label>图标</label>
        <input class="me-input" id="meIc" placeholder="默认✅" maxlength="2">
      </div>
      <div class="me-row">
        <label>名称</label>
        <input class="me-input" id="meN" placeholder="打卡项目名称">
      </div>
      <div class="me-row">
        <label>类型</label>
        <div class="me-type">
          <span class="me-type-btn" data-t="routine" onclick="swType('routine')">跟练型</span>
          <span class="me-type-btn ac" data-t="simple" onclick="swType('simple')">纯打卡</span>
        </div>
      </div>
      <div class="me-row">
        <label>时长</label>
        <div style="display:flex;align-items:center;gap:.5rem;">
          <input class="me-input" id="meT" type="number" min="0.5" step="0.5" placeholder="如：2" style="flex:1;">
          <span style="font-size:.875rem;color:#6a7a90;flex-shrink:0;">分钟</span>
        </div>
      </div>
      <div class="me-row">
        <label>备注（可选）</label>

<script>
// ===== 默认数据 =====
const DEF_ITEMS = [
  {i:'cold',    n:'冷水唤醒',    ic:'❄️',  t:'1min',  dur:1,   no:'洗漱时做', type:'routine',

  {i:'bee',     n:'蜜蜂呼吸',    ic:'🐝',  t:'2min',  dur:2,   type:'routine',
    s:[{t:'坐直闭眼',         h:'',   d:0},{t:'深吸一口气',        h:'',   d:4},{t:'呼气时嗡嗡嗡——',   h:'感受震动', d:8},{t:'深呼吸再来一次',   h:'',   d:4},{t:'呼气嗡——',  h:'',   d:8},{t:'最后一次深呼吸',   h:'',   d:4},{t:'呼气嗡——睁眼',     h:'',   d:10}]},
  {i:'crawl',   n:'交叉爬行',    ic:'⛏️',  t:'2min',  dur:2,   type:'routine',
    s:[{t:'抬右手时抬左膝',   h:'慢慢来',d:15},{t:'抬左手时抬右膝',   h:'',   d:15},{t:'加快速度交替',    h:'',   d:15},{t:'放慢最后5次',    h:'',   d:10}]},
  {i:'starfish',n:'海星呼吸',    ic:'🦑',  t:'2min',  dur:2,   type:'routine', cy:5,
    s:[{t:'仰卧躺平手脚展开',  h:'',   d:0},{t:'慢慢吸气手脚向外展开',h:'像海星张开', d:4},{t:'屏住呼吸保持展开',  h:'',   d:2},{t:'慢慢呼气手脚收回胸前',h:'抱胸弯腿', d:6},{t:'放松休息一下',     h:'',   d:3}]},
  {i:'snow',    n:'雪天使',      ic:'❄️',  t:'2min',  dur:2,   type:'routine',
    s:[{t:'仰卧手臂放两侧',   h:'脊椎贴地',d:0},{t:'呼气手臂滑向头顶',  h:'',   d:6},{t:'吸气手臂滑回',     h:'',   d:6},{t:'重复：呼上吸下',   h:'',   d:24},{t:'最后一次放松',    h:'',   d:6}]},
  {i:'ball',    n:'球上平衡',    ic:'🏐',  t:'2min',  dur:2,   type:'routine', no:'需瑜伽球',
    s:[{t:'趴在球上手脚撑地', h:'',   d:0},{t:'轻轻前后滚',        h:'',   d:20},{t:'试着举手平衡',     h:'',   d:16},{t:'慢慢停下深呼吸',   h:'',   d:8}]},
  {i:'spin',    n:'旋转脱敏',    ic:'🌀',  t:'2min',  dur:2,   type:'routine',
    s:[{t:'闭眼原地转3圈',   h:'',   d:12},{t:'停下来看固定点',     h:'',   d:8},{t:'再闭眼转3圈',    h:'',   d:10},{t:'看固定点',         h:'',   d:8},{t:'深呼吸2次',        h:'',   d:6}]},
  {i:'oneLeg',  n:'单脚站',      ic:'🦩',  t:'2min',  dur:2,   type:'routine',
    s:[{t:'叉腰左脚抬起',     h:'',   d:15},{t:'换右脚',            h:'',   d:15},{t:'左脚闭眼试试',     h:'',   d:10},{t:'右脚闭眼',         h:'',   d:10},{t:'放松抖抖腿',       h:'',   d:6}]},
  {i:'bounce',  n:'弹跳训练',    ic:'🏀',  t:'2min',  dur:2,   type:'routine', no:'有蹦床更佳',
    s:[{t:'原地自由弹跳',     h:'',   d:20},{t:'跳高摸墙',          h:'',   d:20},{t:'边跳边拍手',       h:'',   d:15},{t:'慢慢停下深呼吸',   h:'',   d:8}]},
  {i:'yawn',    n:'打哈欠激活',  ic:'🥱',  t:'30s',   dur:0.5, type:'routine',
    s:[{t:'用力打一个真正的哈欠',h:'假打也能变成真打',d:0},{t:'捏住鼻子闭嘴呼气',h:'不出气', d:8},{t:'松开深呼吸一次',   h:'',   d:6},{t:'最后一次深呼吸',   h:'',   d:6}]},
  {i:'ear',     n:'耳朵拉拽',    ic:'👂',  t:'30s',   dur:0.5, type:'routine',
    s:[{t:'从耳朵上端向下轻拉',h:'',   d:8},{t:'换另一只耳朵',      h:'',   d:8},{t:'两只耳朵同时拉',   h:'',   d:6},{t:'揉一揉放松',       h:'',   d:4}]},
  {i:'shake',   n:'全身抖动',    ic:'💃',  t:'1min',  dur:1,   type:'routine',
    s:[{t:'站起来从手开始甩', h:'',   d:8},{t:'手臂一起甩',        h:'',   d:8},{t:'全身都抖起来',     h:'',   d:12},{t:'慢慢停下深呼吸',   h:'',   d:6}]},
  {i:'yawn2',   n:'哈欠深呼吸',  ic:'😮',  t:'1min',  dur:1,   type:'routine',
    s:[{t:'张嘴打一个大哈欠', h:'',   d:6},{t:'用力吞咽口水',       h:'',   d:4},{t:'伸个懒腰',         h:'',   d:6},{t:'再打哈欠再吞咽',   h:'',   d:6},{t:'深呼吸放松',       h:'',   d:6}]},
  {i:'finger',  n:'指尖对碰',    ic:'🤏',  t:'2min',  dur:2,   type:'routine',
    s:[{t:'拇指依次碰食中无名小指',h:'右手先做', d:12},{t:'换左手',            h:'',   d:12},{t:'左右手同时',       h:'',   d:12},{t:'闭眼再做',         h:'',   d:12},{t:'抖抖手放松',       h:'',   d:4}]},
  {i:'rubber',  n:'橡皮筋拉伸',  ic:'🪢',  t:'2min',  dur:2,   type:'routine', no:'需橡皮筋',
    s:[{t:'指尖套橡皮筋',     h:'',   d:0},{t:'拇指食指撑开',       h:'',   d:12},{t:'拇指中指撑开',     h:'',   d:12},{t:'拇指无名指撑开',   h:'',   d:12},{t:'拇指小指撑开',     h:'',   d:12},{t:'换左手重复',       h:'',   d:20}]},
];

const DEF_SLOTS = [
  { i:'morning', ic:'☀️', n:'上午', ids:['cold','bee','crawl','starfish','oneLeg','finger'] },
  { i:'afternoon', ic:'🌤️', n:'下午', ids:['snow','ball','spin','bounce'] },
  { i:'evening', ic:'🌙', n:'晚上', ids:['yawn','ear','shake','yawn2','snow','starfish'] }
];

// ===== 数据管理 =====
let DC = {}; // { slots: [], items: [], settings: {userName: ''} }

function initDC(){
  const itemsRaw = localStorage.getItem('dc_items');
  if(!itemsRaw){
    // First visit: import defaults
    DC.slots = JSON.parse(JSON.stringify(DEF_SLOTS));
    DC.items = JSON.parse(JSON.stringify(DEF_ITEMS));
    DC.settings = {userName: '小伙伴'};
    flushDC();
    return;
  }
  DC.items = JSON.parse(itemsRaw);
  try{ DC.settings = JSON.parse(localStorage.getItem('dc_settings') || '{}'); }catch(e){ DC.settings = {}; }
  if(!DC.settings.userName) DC.settings.userName = '小伙伴';
  // Load slots
  const slotsRaw = localStorage.getItem('dc_slots');
  if(slotsRaw){
    try{ DC.slots = JSON.parse(slotsRaw); }catch(e){ DC.slots = JSON.parse(JSON.stringify(DEF_SLOTS)); }
  } else {
    DC.slots = JSON.parse(JSON.stringify(DEF_SLOTS));
  }
}

function flushDC(){
  localStorage.setItem('dc_items', JSON.stringify(DC.items));
  localStorage.setItem('dc_slots', JSON.stringify(DC.slots));
  localStorage.setItem('dc_settings', JSON.stringify(DC.settings));
}

function svSlots(){
  localStorage.setItem('dc_slots', JSON.stringify(DC.slots));
}

function getSlot(id){
  return DC.slots.find(s => s.i === id);
}

function getSlotItems(slotId){
  const slot = getSlot(slotId);
  if(!slot) return [];
  return slot.ids.map(id => DC.items.find(x => x.i === id)).filter(Boolean);
}

function getItem(id){
  return DC.items.find(x => x.i === id);
}

// ===== 每日完成记录 =====
function dk(){
  const d = new Date();
  return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
}

let Dn = [];

function loadDn(){
  try{
    const r = localStorage.getItem('dc_'+dk());
    if(r) Dn = JSON.parse(r);
    else Dn = [];
  }catch(e){ Dn = []; }
}

function svDn(){
  localStorage.setItem('dc_'+dk(), JSON.stringify(Dn));
}

// ===== 状态 =====
let St={pi:'morning',dn:[],ex:null,cy:1,cs:1,st:-1,ss:[],pl:false,ti:null,rm:0};

// ===== 首页渲染 =====
function swT(id){
  St.pi = id;
  rH();
}

function rH(){
  // Render greeting
  const grTxt = document.getElementById('grTxt');
  grTxt.textContent = '🌅 早上好，' + (DC.settings.userName || '小伙伴');

  // Render tags (fixed three slots)
  const tgS = document.getElementById('tgS');
  tgS.innerHTML = DC.slots.map(s =>
    `<div class="tagb ${s.i===St.pi?'ac':''}" data-i="${s.i}" onclick="swT('${s.i}')">${s.ic} ${s.n}</div>`
  ).join('');

  // Render items for current slot
  const items = getSlotItems(St.pi);
  const l = document.getElementById('exL');
  l.innerHTML = items.map(x => {
    if(!x) return '';
    const done = Dn.includes(x.i);
    const tpLabel = x.type==='simple' ? '纯打卡' : '跟练型';
    return `<div class="ex ${done?'done':''}" onclick="sX('${x.i}')">
      <div class="ck">${done?'✓':''}</div><div class="ic">${x.ic}</div>
      <div class="inf">${x.n} <span class="s">${x.no||''}</span></div>
      <span class="tp">${tpLabel}</span>
      <div class="tm ${done?'done':''}">${done?'✅ 已完成':(x.dur!=null?x.dur+'分钟':x.t||'')}</div></div>`;
  }).join('');
  if(items.length===0){
    l.innerHTML = '<div class="empty-state">此时段还没有安排项目<br><span style="font-size:.75rem;">去管理页的「时段安排」添加</span></div>';
  }

  upPr();
}

function upPr(){
  const items = getSlotItems(St.pi);
  const t = items.length;
  const d = items.filter(x => x && Dn.includes(x.i)).length;
  document.getElementById('pgN').textContent = `${d} / ${t}`;
  document.getElementById('pgB').style.width = `${t>0 ? d/t*100 : 0}%`;
  const doneItems = items.filter(x => x && Dn.includes(x.i)).map(x => x.ic + x.n).join(' · ');
  document.getElementById('pgT').textContent = d === t && t > 0 ? '🎉 全部完成！' : (doneItems ? '✅ ' + doneItems : '点击打卡项开始');
}

// ===== 进入练习 =====
function sX(id){
  const x = getItem(id);
  if(!x) return;

  // Simple type: complete directly
  if(x.type === 'simple'){
    if(!Dn.includes(id)) Dn.push(id);
    svDn();
    rH();
    // Show completion popup
    const allDone = getSlotItems(St.pi).every(it => it && Dn.includes(it.i));
    document.getElementById('ol').classList.add('show');
    document.getElementById('olT').textContent = `${x.ic} ${x.n} 完成！`;
    document.getElementById('olS').textContent = allDone ? '🎉 今日全部完成！' : '继续加油 💪';
    const det = getSlotItems(St.pi).map(it => (Dn.includes(it.i)?'✅':'⬜')+' '+it.ic+it.n).join('<br>');
    document.getElementById('olD').innerHTML = '今日进度：' + getSlotItems(St.pi).filter(it=>it && Dn.includes(it.i)).length + '/' + getSlotItems(St.pi).length + '<br>' + det;
    return;
  }

  // Routine type: go to practice page
  St.ex = x;
  St.cs = x.cy || 1;
  St.cy = 1;
  St.st = -1;
  St.ss = x.s || [];
  St.pl = false;
  if(St.ti){ clearInterval(St.ti); St.ti = null; }

  // Reset buttons to initial state
  document.getElementById('pExtraBtns').style.display = 'flex';
  document.getElementById('pBtn').textContent = '▶ 开始';
  document.getElementById('pBtn').disabled = false;
  document.getElementById('pBtn').style.cursor = 'pointer';

  document.getElementById('pEn').textContent = x.ic + ' ' + x.n;
  document.getElementById('pIf').textContent = '约' + (x.dur!=null?x.dur+'分钟':x.t||'');
  document.getElementById('pH').classList.remove('active');
  document.getElementById('pP').classList.add('active');
  uPpd();
  uP();
}

function uPpd(){
  const items = getSlotItems(St.pi);
  const d = items.filter(it => it && Dn.includes(it.i)).length;
  document.getElementById('pPd').textContent = d+'/'+items.length;
}

// ===== 跟练状态更新（无画布） =====
function uP(){
  if(!St.ex)return; const x=St.ex; const m=St.cs>1;
  const sn=document.getElementById('pSn'),st=document.getElementById('pSt'),sc=document.getElementById('pSc');
  const tn=document.getElementById('pTim'),tl=document.getElementById('pTimL');
  if(St.st===-1){
    sn.textContent='准备';st.innerHTML=''+(m?`第${St.cy}/${St.cs}轮 `:'')+St.ss[0].t;
    sc.textContent=St.ss[0].h?'💡 '+St.ss[0].h:'';
    tn.textContent='';tl.textContent='';
    rD(1,0);return;
  }
  const s=St.ss[St.st];
  sn.textContent=(m?`第${St.cy}轮·`:'')+'步'+(St.st+1)+'/'+St.ss.length;
  st.innerHTML=s.t;
  sc.innerHTML=(s.h?'💡 '+s.h:'')+(x.no&&St.st===0?`<br><span class="tg2">📌 ${x.no}</span>`:'');
  if(s.d>0){tn.textContent=St.pl?St.rm:s.d;tl.textContent='秒';}else{tn.textContent='—';tl.textContent='';}
  if(m)rD(St.cs,St.cy-1);else rD(St.ss.length,St.st);
}

function rD(n,a){
  const c=document.getElementById('pDt');
  c.innerHTML=Array.from({length:n},(_,i)=>{
    let cl='';if(i<a)cl=' dn';else if(i===a)cl=' act';
    return `<div class="${cl}"></div>`;
  }).join('');
}

// ===== 计时器（自动连播） =====
document.getElementById('pBtn').addEventListener('click',()=>{
  if(!St.ex)return;
  // Hide extra buttons, show "进行中"
  document.getElementById('pExtraBtns').style.display = 'none';
  const btn = document.getElementById('pBtn');
  btn.textContent = '⏳ 进行中...';
  btn.disabled = true;
  btn.style.cursor = 'not-allowed';
  // Start auto-play from first step
  St.st = 0;
  St.cy = 1;
  uP();
  if(St.ss[0] && St.ss[0].d > 0) sT();
});

function sT(){
  const s=St.ss[St.st];if(!s||s.d<=0){ad();return;}
  St.rm=s.d;St.pl=true;uP();
  St.ti=setInterval(()=>{
    St.rm--;uP();
    if(St.rm<=0){clearInterval(St.ti);St.ti=null;St.pl=false;ad();}
  },1000);
}

function ad(){
  St.st++;St.pl=false;
  if(St.st>=St.ss.length){
    if(St.cy>=St.cs){fEx();return;}
    St.cy++;St.st=0;
  }
  uP();
  if(St.st<St.ss.length&&St.ss[St.st].d>0)sT();
}

function doneP(){fEx();}

// ===== 完成 =====
function fEx(){
  const id = St.ex.i;
  if(!Dn.includes(id)) Dn.push(id);
  svDn();
  const items = getSlotItems(St.pi);
  const allDone = items.every(x => x && Dn.includes(x.i));
  document.getElementById('ol').classList.add('show');
  document.getElementById('olT').textContent = `${St.ex.ic} ${St.ex.n} 完成！`;
  document.getElementById('olS').textContent = allDone ? '🎉 今日全部完成！' : '继续加油，还有练习等着你 💪';
  const det = items.map(x => (Dn.includes(x.i)?'✅':'⬜')+' '+x.ic+x.n).join('<br>');
  document.getElementById('olD').innerHTML = '今日进度：'+items.filter(x=>x && Dn.includes(x.i)).length+'/'+items.length+'<br>'+det;
  // Reset button state for next time
  document.getElementById('pExtraBtns').style.display = 'flex';
  document.getElementById('pBtn').textContent = '▶ 开始';
  document.getElementById('pBtn').disabled = false;
  document.getElementById('pBtn').style.cursor = 'pointer';
}

function resetP(){
  clOl();
  if(St.ti){clearInterval(St.ti);St.ti=null;}
  if(St.ex){
    St.st=-1;St.cy=1;St.pl=false;St.rm=0;
    document.getElementById('pExtraBtns').style.display = 'flex';
    const btn = document.getElementById('pBtn');
    btn.textContent = '▶ 开始';
    btn.disabled = false;
    btn.style.cursor = 'pointer';
    uP();
  }
}

// ===== 弹窗控制 =====
function clOl(){document.getElementById('ol').classList.remove('show');}
function goH(){
  clOl();clCf();
  if(St.ti){clearInterval(St.ti);St.ti=null;}
  document.getElementById('pP').classList.remove('active');
  document.getElementById('pM').classList.remove('active');
  document.getElementById('pME').classList.remove('active');
  document.getElementById('pH').classList.add('active');
  rH();
  // Reset button state
  document.getElementById('pExtraBtns').style.display = 'flex';
  const pBtn = document.getElementById('pBtn');
  pBtn.textContent = '▶ 开始';
  pBtn.disabled = false;
  pBtn.style.cursor = 'pointer';
}
function cfExit(){document.getElementById('cf').classList.add('show');}
function clCf(){document.getElementById('cf').classList.remove('show');}
function doExit(){clCf();goH();}

// ===== 姓名编辑 =====
function openNE(){
  document.getElementById('neInput').value = DC.settings.userName || '';
  document.getElementById('ne').classList.add('show');
  setTimeout(()=>document.getElementById('neInput').focus(),100);
}
function clNE(){document.getElementById('ne').classList.remove('show');}
function saveNE(){
  const v = document.getElementById('neInput').value.trim();
  if(v){
    DC.settings.userName = v;
    flushDC();
    rH();
  }
  clNE();
}

// ===== 删除确认 =====
let delCallback = null;
function showDC(title, subtitle, cb){
  document.getElementById('dcT').textContent = title;
  document.getElementById('dcS').textContent = subtitle || '此操作不可恢复';
  delCallback = cb;
  document.getElementById('dc').classList.add('show');
}
function clDC(){document.getElementById('dc').classList.remove('show'); delCallback = null;}
function doDel(){
  if(delCallback){ delCallback(); delCallback = null; }
  clDC();
}

// ===== 重置今日 =====
function resetToday(){
  showDC('重置今日打卡？', '所有今日完成记录将被清除', ()=>{
    Dn = [];
    svDn();
    rH();
  });
}

// ===== 管理页 =====
function openMg(){
  document.getElementById('pH').classList.remove('active');
  document.getElementById('pM').classList.add('active');
  rMg();
}

function rMg(){
  rMgItems();
  rSlotOverview();
}

function rMgItems(){
  const l = document.getElementById('mgItemList');
  l.innerHTML = DC.items.map(x => {
    const tp = x.type==='simple' ? '纯打卡' : '跟练型';
    return `<div class="mg-item">
      <div class="ic">${x.ic}</div>
      <div class="inf">
        <div class="n">${x.n}</div>
        <div class="det">${tp} · ${x.dur!=null?x.dur+'分钟':x.t||''}</div>
      </div>
      <div class="mg-acts">
        <span onclick="openEditor('${x.i}')">✏️</span>
        <span onclick="delItem('${x.i}')">🗑️</span>
      </div>
    </div>`;
  }).join('');
  if(DC.items.length===0){
    l.innerHTML = '<div class="empty-state">还没有打卡项目<br><span style="font-size:.75rem;">点击下方按钮新建</span></div>';
  }
}

function rSlotOverview(){
  const l = document.getElementById('slotOverview');
  l.innerHTML = DC.slots.map(s => {
    const slotItems = getSlotItems(s.i);
    const itemTags = slotItems.map(x => `<span class="tag">${x.ic} ${x.n}</span>`).join('');
    return `<div class="slot-card">
      <div class="hdr">
        <span class="icn">${s.ic}</span>
        <span class="nm">${s.n}</span>
        <button class="edit-btn" onclick="openSE('${s.i}')">编辑安排</button>
      </div>
      <div class="items">${itemTags || '<span class="empty">暂未安排项目</span>'}</div>
    </div>`;
  }).join('');
}

function delItem(id){
  const x = getItem(id);
  if(!x) return;
  showDC(`删除「${x.n}」？`, '此操作不可恢复', ()=>{
    DC.items = DC.items.filter(it => it.i !== id);
    // Also remove from all slots
    DC.slots.forEach(s => {
      s.ids = s.ids.filter(i => i !== id);
    });
    flushDC();
    rMg();
    rH();
  });
}

// ===== 时段安排弹窗 =====
let seSlotId = null;

function openSE(slotId){
  seSlotId = slotId;
  const slot = getSlot(slotId);
  if(!slot) return;
  document.getElementById('seT').textContent = slot.ic + ' ' + slot.n + ' · 安排项目';
  renderSE();
  document.getElementById('se').classList.add('show');
}

function clSE(){
  document.getElementById('se').classList.remove('show');
  seSlotId = null;
}

function renderSE(){
  const l = document.getElementById('seL');
  const slot = getSlot(seSlotId);
  if(!slot) return;
  l.innerHTML = DC.items.map(x => {
    const chk = slot.ids.includes(x.i);
    const tp = x.type==='simple' ? '纯打卡' : '跟练型';
    return `<div class="si ${chk?'chk':''}" onclick="tgSE('${x.i}')">
      <div class="cb">${chk?'✓':''}</div>
      <div class="ic">${x.ic}</div>
      <div class="nn">${x.n}</div>
      <span class="tp">${tp}</span>
    </div>`;
  }).join('');
  if(DC.items.length===0){
    l.innerHTML = '<div class="empty-state">还没有打卡项目<br><span style="font-size:.75rem;">先创建项目再来安排</span></div>';
  }
}

function tgSE(id){
  const slot = getSlot(seSlotId);
  if(!slot) return;
  const idx = slot.ids.indexOf(id);
  if(idx > -1){
    slot.ids.splice(idx, 1);
  } else {
    slot.ids.push(id);
  }
  renderSE();
}

function svSE(){
  svSlots();
  clSE();
  rMg();
  rH();
}

// ===== 项目编辑器 =====
let editingId = null;

function openEditor(id){
  editingId = id;
  const el = document.getElementById('meTitle');
  el.textContent = id ? '编辑打卡项目' : '新建打卡项目';

  if(id){
    const x = getItem(id);
    if(x){
      document.getElementById('meIc').value = x.ic || '';
      document.getElementById('meN').value = x.n || '';
      swType(x.type || 'simple');
      document.getElementById('meT').value = x.dur != null ? x.dur : '';
      document.getElementById('meNo').value = x.no || '';
      document.getElementById('meCy').value = x.cy || 1;
      renderSteps(x.s || []);
    }
  } else {
    document.getElementById('meIc').value = '';
    document.getElementById('meN').value = '';
    swType('simple');
    document.getElementById('meT').value = '';
    document.getElementById('meNo').value = '';
    document.getElementById('meCy').value = 1;
    renderSteps([]);
  }

  document.getElementById('pM').classList.remove('active');
  document.getElementById('pME').classList.add('active');
}

function closeEditor(){
  document.getElementById('pME').classList.remove('active');
  document.getElementById('pM').classList.add('active');
  rMg();
}

function swType(type){
  document.querySelectorAll('.me-type-btn').forEach(b => b.classList.toggle('ac', b.dataset.t===type));
  const showSteps = type === 'routine';
  document.getElementById('meSteps').style.display = showSteps ? 'block' : 'none';
  document.getElementById('meCy').parentElement.style.display = showSteps ? 'flex' : 'none';
}

// ===== 步骤编辑器 =====
let stepData = [];

function renderSteps(steps){
  stepData = steps.map((s,i) => ({...s, _k:i}));
  renderStepList();
}

function renderStepList(){
  const l = document.getElementById('meStepList');
  l.innerHTML = stepData.map((s, i) => `
    <div class="me-step">
      <div class="hdr">
        <span class="label">步骤 ${i+1}</span>
        <span class="rm" onclick="rmStep(${i})">🗑️</span>
      </div>
      <div class="sf">
        <div class="srow">
          <input class="st-name" value="${escHtml(s.t)}" placeholder="步骤名" oninput="udStep(${i},'t',this.value)">
          <input class="dur" type="number" value="${s.d}" placeholder="秒" min="0" oninput="udStep(${i},'d',Number(this.value)||0)">
        </div>
        <div class="srow">
          <input value="${escHtml(s.h||'')}" placeholder="提示（可选）" oninput="udStep(${i},'h',this.value)">
        </div>
      </div>
    </div>
  `).join('');
}

function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function udStep(i, k, v){
  if(stepData[i]) stepData[i][k] = v;
}

function addStep(){
  stepData.push({t:'', h:'', d:10, _k:Date.now()});
  renderStepList();
}

function rmStep(i){
  stepData.splice(i,1);
  renderStepList();
}

// ===== 保存项目 =====
function saveItem(){
  const ic = document.getElementById('meIc').value.trim();
  const n = document.getElementById('meN').value.trim();
  const dur = parseFloat(document.getElementById('meT').value) || 1;
  const t = dur + '分钟';
  const no = document.getElementById('meNo').value.trim();
  const cy = parseInt(document.getElementById('meCy').value) || 1;
  const type = document.querySelector('.me-type-btn.ac').dataset.t;

  if(!n){ alert('请输入名称'); return; }

  if(editingId){
    const x = getItem(editingId);
    if(x){
      x.ic = ic || '✅';
      x.n = n;
      x.t = t;
      x.dur = dur;
      x.no = no;
      x.cy = type==='routine' ? cy : undefined;
      x.type = type;
      if(type==='routine'){
        x.s = stepData.map(s => ({t:s.t, h:s.h||'', d:Number(s.d)||0}));
      } else {
        x.s = [];
        delete x.cy;
      }
    }
  } else {
    const id = 'item_'+Date.now();
    const item = {
      i: id,
      ic: ic || '✅',
      n: n,
      t: t,
      dur: dur,
      no: no,
      type: type
    };
    if(type==='routine'){
      item.cy = cy;
      item.s = stepData.map(s => ({t:s.t, h:s.h||'', d:Number(s.d)||0}));
    } else {
      item.s = [];
    }
    DC.items.push(item);
  }

  flushDC();
  closeEditor();
  rH();
}

// ===== 启动 =====
initDC();
loadDn();
// Ensure pi is valid
if(!getSlot(St.pi)) St.pi = DC.slots.length > 0 ? DC.slots[0].i : 'morning';
rH();
</script>
