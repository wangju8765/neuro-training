<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>🧠 神经功能训练</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,'PingFang SC','Noto Sans SC',sans-serif;background:#0f1923;color:#e8edf2;min-height:100dvh;overflow:hidden;}
.page{display:none;flex-direction:column;height:100dvh;animation:fadeIn .3s ease;}
.page.active{display:flex;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.topbar{display:flex;align-items:center;padding:14px 16px;gap:12px;border-bottom:1px solid #1f3348;flex-shrink:0;}
.topbar .back{font-size:22px;cursor:pointer;padding:4px;opacity:.7;transition:.2s;}
.topbar .back:active{opacity:1;transform:scale(.9);}
.topbar .tt{flex:1;font-size:17px;font-weight:600;}
.topbar .sub{font-size:13px;color:#7a94b0;}
.home-scroll{flex:1;overflow-y:auto;padding:16px;}
.home-header{padding:20px 4px 8px;}
.home-header h1{font-size:26px;font-weight:700;}
.home-header p{color:#7a94b0;font-size:14px;margin-top:4px;}
.section-title{font-size:15px;font-weight:600;color:#8aa0b8;margin:20px 0 12px 4px;}
.plan-grid{display:flex;flex-direction:column;gap:10px;}
.plan-card{background:#1a2b3c;border-radius:16px;padding:16px;cursor:pointer;transition:.2s;border:1px solid #1f3348;display:flex;align-items:center;gap:14px;}
.plan-card:active{background:#1f3348;transform:scale(.98);}
.plan-card .icon{font-size:28px;width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:#0f1923;border-radius:12px;flex-shrink:0;}
.plan-card .info{flex:1;}
.plan-card .info .name{font-size:16px;font-weight:600;}
.plan-card .info .desc{font-size:12px;color:#7a94b0;margin-top:2px;}
.plan-card .info .tag{display:inline-block;font-size:11px;padding:1px 6px;border-radius:4px;margin-top:4px;background:#2d4c6e;color:#a0c4e8;}
.plan-card .time{font-size:14px;color:#7a94b0;font-weight:600;}
.weekstrip{display:flex;gap:6px;justify-content:center;padding:16px 0;margin-top:8px;flex-shrink:0;}
.weekday{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;background:#1a2b3c;color:#5a7a98;}
.weekday.done{background:#2d4c6e;color:#4fc3f7;}
.weekday.today{border:2px solid #4fc3f7;color:#4fc3f7;}
.exercise-quick{display:flex;flex-wrap:wrap;gap:8px;padding:8px 4px;}
.eq-btn{background:#1a2b3c;border:1px solid #1f3348;border-radius:20px;padding:8px 16px;font-size:13px;color:#c8d6e5;cursor:pointer;transition:.2s;}
.eq-btn:active{background:#2d4c6e;}
.practice-scroll{flex:1;display:flex;flex-direction:column;align-items:center;padding:20px 16px;overflow-y:auto;}
.practice-canvas-wrap{width:280px;height:280px;background:#1a2b3c;border-radius:20px;position:relative;box-shadow:0 8px 32px rgba(0,0,0,.4);margin-bottom:14px;flex-shrink:0;}
@media(max-width:420px){.practice-canvas-wrap{width:220px;height:220px;}}
#practiceCanvas{width:100%;height:100%;display:block;}
.exercise-timer{text-align:center;margin-bottom:12px;flex-shrink:0;}
.exercise-timer .num{font-size:42px;font-weight:200;color:#4fc3f7;letter-spacing:2px;line-height:1;}
.exercise-timer .label{font-size:13px;color:#5a7a98;}
.breath-label{text-align:center;font-size:16px;margin-bottom:10px;flex-shrink:0;}
.breath-label .inhale{color:#4fc3f7;font-weight:600;}
.breath-label .exhale{color:#a5d6a7;font-weight:600;}
.breath-label .hold{color:#fff176;font-weight:600;}
.breath-label .rest{color:#8aa0b8;}
.step-text-box{width:100%;max-width:400px;background:#1a2b3c;border-radius:14px;padding:16px;margin-bottom:8px;border:1px solid #1f3348;flex-shrink:0;}
.step-text-box .num{font-size:12px;color:#5a7a98;margin-bottom:4px;}
.step-text-box .text{font-size:17px;line-height:1.5;}
.step-text-box .text .hl{color:#4fc3f7;}
.step-text-box .hint{font-size:13px;color:#8aa0b8;margin-top:8px;border-left:3px solid #2d4c6e;padding-left:12px;}
.progress-row{width:100%;max-width:400px;display:flex;align-items:center;gap:10px;margin:6px 0 10px;flex-shrink:0;}
.progress-row .bar{flex:1;height:5px;background:#1f3348;border-radius:3px;overflow:hidden;}
.progress-row .bar .fill{height:100%;width:0%;background:linear-gradient(90deg,#4fc3f7,#81d4fa);border-radius:3px;transition:width .4s;}
.progress-row .label{font-size:12px;color:#7a94b0;white-space:nowrap;}
.step-dots{display:flex;gap:8px;justify-content:center;margin:6px 0;flex-shrink:0;}
.step-dot{width:8px;height:8px;border-radius:50%;background:#1f3348;transition:.3s;}
.step-dot.active{background:#4fc3f7;transform:scale(1.2);}
.step-dot.done{background:#a5d6a7;}
.btn-row{width:100%;max-width:400px;display:flex;gap:10px;margin-top:auto;padding:8px 0;flex-shrink:0;}
.btn{flex:1;padding:16px;border:none;border-radius:14px;font-size:16px;font-weight:600;cursor:pointer;transition:.15s;}
.btn:active{transform:scale(.97);}
.btn-pri{background:linear-gradient(135deg,#4fc3f7,#29b6f6);color:#0f1923;}
.btn-pri:disabled{opacity:.3;cursor:not-allowed;transform:none;}
.btn-sec{background:#1f3348;color:#8aa0b8;}
.btn-stop{background:#3d1f1f;color:#ef9a9a;}
.complete-overlay{display:none;position:fixed;inset:0;background:rgba(15,25,35,.95);z-index:100;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
.complete-overlay.show{display:flex;}
.complete-icon{font-size:60px;}
.complete-text{font-size:22px;font-weight:700;color:#a5d6a7;}
.complete-sub{font-size:14px;color:#7a94b0;text-align:center;line-height:1.6;}
</style>
</head>
<body>

<div class="page active" id="pageHome">
  <div class="home-scroll">
    <div class="home-header">
      <h1>🧠 神经训练</h1>
      <p>茂懿的每日跟练 · 坚持就是进步</p>
    </div>
    <div class="section-title">📋 今日套餐</div>
    <div class="plan-grid" id="planGrid"></div>
    <div class="section-title">🏋️ 全部练习</div>
    <div class="exercise-quick" id="exerciseQuick"></div>
    <div class="section-title">📅 本周</div>
    <div class="weekstrip" id="weekStrip"></div>
    <div style="height:20px"></div>
  </div>
</div>

<div class="page" id="pagePractice">
  <div class="topbar">
    <span class="back" onclick="exitPractice()">✕</span>
    <span class="tt" id="practiceTitle">练习</span>
    <span class="sub" id="practiceRound"></span>
  </div>
  <div class="practice-scroll" id="practiceScroll">
    <div class="breath-label" id="breathLabel">🌬️ 准备</div>
    <div class="practice-canvas-wrap">
      <canvas id="practiceCanvas" width="280" height="280"></canvas>
      <div class="exercise-timer" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;">
        <div class="num" id="timerNum"></div>
        <div class="label" id="timerLabel"></div>
      </div>
    </div>
    <div class="step-text-box">
      <div class="num" id="stepNum">准备</div>
      <div class="text" id="stepText">选择练习，开始吧</div>
      <div class="hint" id="stepHint"></div>
    </div>
    <div class="progress-row">
      <div class="bar"><div class="fill" id="progressFill"></div></div>
      <span class="label" id="progressLabel">0%</span>
    </div>
    <div class="step-dots" id="stepDots"></div>
    <div class="btn-row">
      <button class="btn btn-stop" id="resetBtn" onclick="resetPractice()">🔄 重来</button>
      <button class="btn btn-pri" id="actionBtn" onclick="handleAction()">▶ 开始训练</button>
    </div>
  </div>
</div>

<div class="complete-overlay" id="completeOverlay">
  <div class="complete-icon">🎉</div>
  <div class="complete-text" id="completeText">完成！</div>
  <div class="complete-sub" id="completeSub"></div>
  <div class="btn-row" style="max-width:300px;padding:0 20px;" id="completeButtons">
    <button class="btn btn-sec" onclick="goHome()">🏠 首页</button>
    <button class="btn btn-pri" onclick="resetPractice()">🔄 再来一组</button>
  </div>
</div>

<script>
// ====== 数据 ======
const EXERCISES = [
  { id:'yawn', name:'打哈欠激活', icon:'🥱', cat:'预备唤醒', catClass:'cat1', time:'30s',
    steps:[
      {text:'用力打一个真正的哈欠', hint:'假打也能变成真打', dur:0},
      {text:'捏住鼻子，闭嘴试着呼气', hint:'不出气，感受喉咙的紧张', dur:8},
      {text:'松开，深呼吸一次', hint:'重复3次', dur:6},
      {text:'再做一次深呼吸', hint:'', dur:6},
      {text:'最后一次深呼吸', hint:'', dur:6},
    ]},
  { id:'earPull', name:'耳朵拉拽', icon:'👂', cat:'预备唤醒', catClass:'cat1', time:'30s',
    steps:[
      {text:'从耳朵最上端开始，轻轻向下拉', hint:'沿耳朵外侧慢慢拉到耳垂', dur:8},
      {text:'换另一只耳朵，从上到下轻拉', hint:'', dur:8},
      {text:'两只耳朵同时拉一遍', hint:'', dur:6},
      {text:'揉一揉耳朵，放松', hint:'', dur:4},
    ]},
  { id:'shake', name:'全身抖动', icon:'💃', cat:'预备唤醒', catClass:'cat1', time:'1min',
    steps:[
      {text:'站起来，从手开始甩', hint:'像MC被击退后的效果', dur:8},
      {text:'手臂一起甩', hint:'让手臂像面条一样晃动', dur:8},
      {text:'带动肩膀抖动', hint:'', dur:8},
      {text:'全身都抖起来', hint:'像甩干机一样', dur:10},
      {text:'慢慢停下来，站直深呼吸', hint:'', dur:6},
    ]},
  { id:'starfish', name:'海星呼吸', icon:'🦑', cat:'原始反射整合', catClass:'cat2', time:'2min', cycles:5,
    steps:[
      {text:'仰卧躺平，手脚自然展开', hint:'找一个舒服平坦的地方', dur:0},
      {text:'慢慢<span class="hl">吸气</span>，同时手脚向外展开', hint:'像海星一样张开', dur:4},
      {text:'屏住呼吸，保持展开', hint:'感受胸腔的扩展', dur:2},
      {text:'慢慢<span class="hl">呼气</span>，手脚收回胸前', hint:'手臂交叉抱胸，腿弯曲', dur:6},
      {text:'全身放松，休息一下', hint:'感受身体的平静', dur:3},
    ]},
  { id:'crossCrawl', name:'交叉爬行', icon:'⛏️', cat:'原始反射整合', catClass:'cat2', time:'2min',
    steps:[
      {text:'四肢着地，做好准备', hint:'像MC里的苦力怕爬行', dur:0},
      {text:'抬右手时抬左膝', hint:'慢一点，感受对侧协调', dur:15},
      {text:'抬左手时抬右膝', hint:'','dur':15},
      {text:'加快速度，保持交替', hint:'','dur':15},
      {text:'放慢速度做最后的5次', hint:'深呼吸收尾', dur:10},
    ]},
  { id:'snowAngel', name:'雪天使', icon:'❄️', cat:'原始反射整合', catClass:'cat2', time:'2min',
    steps:[
      {text:'仰卧，双腿伸直，手臂放身体两侧', hint:'脊椎要贴紧地面', dur:0},
      {text:'<span class="hl">呼气</span>，手臂沿地面滑向头顶', hint:'像在雪里画天使翅膀', dur:6},
      {text:'<span class="hl">吸气</span>，手臂滑回身体两侧', hint:'', dur:6},
      {text:'重复：呼气上滑，吸气下滑', hint:'保持慢速', dur:24},
      {text:'最后一次，做完放松', hint:'感受背部的舒展', dur:6},
    ]},
  { id:'ballBalance', name:'球上平衡', icon:'🏐', cat:'原始反射整合', catClass:'cat2', time:'2min',
    note:'需要瑜伽球',
    steps:[
      {text:'趴在瑜伽球上，手脚支撑地面', hint:'球直径55-65cm最佳', dur:0},
      {text:'轻轻前后滚动，保持平衡', hint:'幅度不超过30°', dur:20},
      {text:'试着举手保持平衡', hint:'像High Five', dur:16},
      {text:'慢慢停下来，深呼吸', hint:'', dur:8},
    ]},
  { id:'spin', name:'旋转脱敏', icon:'🌀', cat:'前庭-小脑', catClass:'cat3', time:'2min',
    steps:[
      {text:'站起来，闭眼原地转3圈', hint:'慢慢转', dur:12},
      {text:'停下来，睁眼看一个固定点', hint:'记录多久恢复平衡', dur:8},
      {text:'再次闭眼转3圈', hint:'可以稍微快一点', dur:10},
      {text:'停下来，固定一点看', hint:'', dur:8},
      {text:'深呼吸2次', hint:'', dur:6},
    ]},
  { id:'oneLeg', name:'单脚站挑战', icon:'🦩', cat:'前庭-小脑', catClass:'cat3', time:'2min',
    steps:[
      {text:'双手叉腰，左脚抬起', hint:'记录能站多久', dur:15},
      {text:'换右脚站立', hint:'', dur:15},
      {text:'左脚再来一次，闭眼试试', hint:'闭眼更难！', dur:10},
      {text:'换右脚闭眼站立', hint:'', dur:10},
      {text:'放松，抖抖腿', hint:'', dur:6},
    ]},
  { id:'bounce', name:'弹跳训练', icon:'🏀', cat:'前庭-小脑', catClass:'cat3', time:'2min',
    note:'有蹦床更佳',
    steps:[
      {text:'原地自由弹跳', hint:'像在MC里跳方块', dur:20},
      {text:'跳高摸墙或者摸天花板', hint:'', dur:20},
      {text:'边跳边拍手', hint:'增加协调难度', dur:15},
      {text:'慢慢停下，深呼吸', hint:'', dur:8},
    ]},
  { id:'beeBreath', name:'蜜蜂呼吸', icon:'🐝', cat:'迷走神经', catClass:'cat4', time:'2min',
    steps:[
      {text:'坐直，闭上眼睛', hint:'', dur:0},
      {text:'深吸一口气', hint:'', dur:4},
      {text:'<span class="hl">呼气</span>时发出"嗡嗡嗡——"声', hint:'感受嘴唇和胸腔震动', dur:8},
      {text:'深呼吸，再来一次', hint:'', dur:4},
      {text:'<span class="hl">呼气</span>嗡——', hint:'', dur:8},
      {text:'最后一次深呼吸', hint:'', dur:4},
      {text:'<span class="hl">呼气</span>嗡——，慢慢睁眼', hint:'', dur:10},
    ]},
  { id:'coldWake', name:'冷水唤醒', icon:'❄️', cat:'迷走神经', catClass:'cat4', time:'1min',
    note:'在洗漱时一起做',
    steps:[
      {text:'用冷水拍脸颊和眼周', hint:'不需要浸全身', dur:8},
      {text:'冷水拍脖子前侧', hint:'', dur:6},
      {text:'深吸气，缓慢呼出', hint:'感受脸部冰凉后的清醒', dur:8},
      {text:'深呼吸第二次', hint:'', dur:8},
      {text:'深呼吸第三次', hint:'完成！', dur:8},
    ]},
  { id:'gagReflex', name:'哈欠深呼吸', icon:'😮', cat:'迷走神经', catClass:'cat4', time:'1min',
    steps:[
      {text:'张大嘴打一个大哈欠', hint:'假打很快就变成真打', dur:6},
      {text:'用力吞咽口水', hint:'', dur:4},
      {text:'用力伸个懒腰', hint:'', dur:6},
      {text:'再打一个哈欠，然后吞咽', hint:'', dur:6},
      {text:'深呼吸，放松', hint:'', dur:6},
    ]},
  { id:'fingerTap', name:'指尖对碰', icon:'🤏', cat:'精细运动', catClass:'cat5', time:'2min',
    steps:[
      {text:'大拇指依次碰食指→中指→无名指→小指', hint:'右手先做', dur:12},
      {text:'换左手做一遍', hint:'', dur:12},
      {text:'加速！左右手同时做', hint:'', dur:12},
      {text:'<span class="hl">闭眼</span>再做一次', hint:'去掉视觉补偿效果更好', dur:12},
      {text:'抖抖手放松', hint:'', dur:4},
    ]},
  { id:'rubberBand', name:'橡皮筋拉伸', icon:'🪢', cat:'精细运动', catClass:'cat5', time:'2min',
    note:'需要橡皮筋',
    steps:[
      {text:'指尖套一根橡皮筋', hint:'', dur:0},
      {text:'大拇指和食指把橡皮筋撑开', hint:'', dur:12},
      {text:'大拇指和中指撑开', hint:'', dur:12},
      {text:'大拇指和无名指撑开', hint:'', dur:12},
      {text:'大拇指和小指撑开', hint:'', dur:12},
      {text:'换左手重复一遍', hint:'', dur:20},
    ]},
];

const PLANS = [
  {id:'morning', icon:'☀️', name:'早晨套餐', tag:'唤醒', exIds:['coldWake','beeBreath','crossCrawl']},
  {id:'am', icon:'🌤️', name:'上午套餐', tag:'专注', exIds:['starfish','oneLeg','fingerTap']},
  {id:'pm', icon:'🏃', name:'下午套餐', tag:'激活', exIds:['snowAngel','ballBalance','spin','beeBreath']},
  {id:'night', icon:'🌙', name:'睡前套餐', tag:'放松', exIds:['snowAngel','starfish','gagReflex']},
];

// ====== 状态 ======
let S = {
  mode: null,          // 'plan' | 'single'
  plan: null,          // 当前套餐对象
  ex: null,            // 当前练习对象
  exIdx: 0,            // 套餐中的练习索引
  cycle: 1,
  cycles: 1,           // 当前练习总轮数
  step: -1,            // -1=未开始
  steps: [],           // 当前练习的步骤数组
  playing: false,
  timer: null,
  remain: 0,
};

// ====== 工具 ======
function findEx(id) { return EXERCISES.find(e => e.id === id); }

// ====== 导航 ======
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome() {
  cleanupTimer();
  closeOverlay();
  showPage('pageHome');
  renderHome();
}

function exitPractice() {
  cleanupTimer();
  closeOverlay();
  goHome();
}

// ====== 首页 ======
function renderHome() {
  const grid = document.getElementById('planGrid');
  grid.innerHTML = PLANS.map(p => {
    const names = p.exIds.map(id => { const e = findEx(id); return e ? e.name : ''; }).filter(Boolean).join('、');
    return `<div class="plan-card" onclick="startPlan('${p.id}')">
      <div class="icon">${p.icon}</div>
      <div class="info">
        <div class="name">${p.name}</div>
        <div class="desc">${names}</div>
        <span class="tag">${p.tag}</span>
      </div>
      <div class="time">${p.exIds.length}个</div>
    </div>`;
  }).join('');

  const eq = document.getElementById('exerciseQuick');
  eq.innerHTML = EXERCISES.map(e => `<div class="eq-btn" onclick="startSingle('${e.id}')">${e.icon} ${e.name}</div>`).join('');

  const week = document.getElementById('weekStrip');
  const days = ['一','二','三','四','五','六','日'];
  const today = new Date().getDay();
  const ti = today === 0 ? 6 : today - 1;
  const logs = getLogs();
  week.innerHTML = days.map((d,i) => {
    const cls = ['weekday'];
    if (i === ti) cls.push('today');
    if (logs[i]) cls.push('done');
    return `<div class="${cls.join(' ')}">${d}</div>`;
  }).join('');
}

// ====== 启动练习 ======
function startPlan(pid) {
  const p = PLANS.find(x => x.id === pid);
  if (!p) return;
  S.mode = 'plan';
  S.plan = p;
  S.exIdx = 0;
  loadEx(p.exIds[0]);
}

function startSingle(eid) {
  const e = findEx(eid);
  if (!e) return;
  S.mode = 'single';
  S.plan = null;
  loadEx(eid);
}

function loadEx(eid) {
  const e = findEx(eid);
  if (!e) return;
  S.ex = e;
  S.cycle = 1;
  S.cycles = e.cycles || 1;
  S.step = -1;
  S.steps = e.steps;
  S.playing = false;
  cleanupTimer();

  document.getElementById('practiceTitle').textContent = e.icon + ' ' + e.name;
  showPage('pagePractice');
  updateUI();
}

// ====== UI 更新 ======
function updateUI() {
  const ex = S.ex;
  if (!ex) return;

  const multi = S.cycles > 1;
  document.getElementById('practiceRound').textContent = multi ? `第${S.cycle}/${S.cycles}轮` : '';

  const stepNum = document.getElementById('stepNum');
  const stepText = document.getElementById('stepText');
  const stepHint = document.getElementById('stepHint');
  const bl = document.getElementById('breathLabel');
  const tn = document.getElementById('timerNum');
  const tl = document.getElementById('timerLabel');
  const pf = document.getElementById('progressFill');
  const pl = document.getElementById('progressLabel');
  const ab = document.getElementById('actionBtn');

  if (S.step === -1) {
    stepNum.textContent = '准备';
    stepText.textContent = S.steps[0].text;
    stepHint.textContent = S.steps[0].hint || '💡 准备好了吗？';
    bl.innerHTML = '🌬️ 准备';
    tn.textContent = ''; tl.textContent = '';
    pf.style.width = '0%'; pl.textContent = '0%';
    ab.textContent = '▶ 开始训练'; ab.disabled = false;
    drawChar(0.1);
    renderDots(multi ? S.cycles : S.steps.length, 0);
    return;
  }

  const s = S.steps[S.step];
  stepNum.textContent = multi ? `第${S.cycle}轮 · 步${S.step+1}` : `第${S.step+1}/${S.steps.length}步`;
  stepText.innerHTML = s.text;
  stepHint.textContent = s.hint || '';

  const t = s.text;
  if (t.includes('吸气')) bl.innerHTML = '🌬️ <span class="inhale">吸气 ↑</span>';
  else if (t.includes('呼气')) bl.innerHTML = '🌬️ <span class="exhale">呼气 ↓</span>';
  else if (t.includes('屏住') || t.includes('屏息')) bl.innerHTML = '🌬️ <span class="hold">屏息 —</span>';
  else if (t.includes('放松') || t.includes('休息')) bl.innerHTML = '🌿 <span class="rest">放松</span>';
  else bl.innerHTML = '🌬️';

  if (s.dur > 0) {
    tn.textContent = S.playing ? S.remain : s.dur;
    tl.textContent = '秒';
  } else {
    tn.textContent = ''; tl.textContent = '';
  }

  const total = S.steps.length * S.cycles;
  const done = (S.cycle - 1) * S.steps.length + S.step;
  const pct = Math.min(100, done / total * 100);
  pf.style.width = pct + '%'; pl.textContent = Math.floor(pct) + '%';

  if (multi) renderDots(S.cycles, S.cycle - 1);
  else renderDots(S.steps.length, S.step);

  if (S.playing) {
    ab.textContent = '⏳ 进行中...'; ab.disabled = true;
  } else {
    ab.textContent = '▶ 下一步'; ab.disabled = false;
  }

  // 动画：第0步合拢，1-2步展开，其余合拢
  let ratio = 0.1;
  if (S.step >= 1 && S.step <= 2) {
    ratio = S.playing ? 0.3 + 0.7 * (1 - S.remain / s.dur) : 1;
  }
  drawChar(Math.max(0.1, Math.min(1, ratio)));
}

function renderDots(n, active) {
  const c = document.getElementById('stepDots');
  c.innerHTML = Array.from({length: n}, (_, i) => {
    let cls = 'step-dot';
    if (i < active) cls += ' done';
    else if (i === active) cls += ' active';
    return `<div class="${cls}"></div>`;
  }).join('');
}

// ====== 动作逻辑 ======
function handleAction() {
  if (!S.ex || S.step < 0 || S.step >= S.steps.length) return;

  if (S.step >= 0 && !S.playing) {
    startTimer();
  }
}

function startTimer() {
  const s = S.steps[S.step];
  if (!s || s.dur <= 0) {
    advance();
    return;
  }
  S.remain = s.dur;
  S.playing = true;
  updateUI();
  S.timer = setInterval(() => {
    S.remain--;
    updateUI();
    if (S.remain <= 0) {
      cleanupTimer();
      S.playing = false;
      advance();
    }
  }, 1000);
}

function cleanupTimer() {
  if (S.timer) { clearInterval(S.timer); S.timer = null; }
}

function advance() {
  S.step++;
  S.playing = false;

  // 检查是否完成该练习的所有轮次
  if (S.step >= S.steps.length) {
    if (S.cycle >= S.cycles) {
      // 全部完成→跳到下一个练习
      nextExOrFinish();
      return;
    }
    S.cycle++;
    S.step = 0;
  }

  updateUI();
  // 有计时则自动开始
  if (S.step < S.steps.length && S.steps[S.step].dur > 0) {
    startTimer();
  }
}

function nextExOrFinish() {
  // 套餐模式下，检查是否还有下一个练习
  if (S.mode === 'plan' && S.plan) {
    S.exIdx++;
    if (S.exIdx < S.plan.exIds.length) {
      loadEx(S.plan.exIds[S.exIdx]);
      return;
    }
  }
  // 没有下一个→整体完成
  finishAll();
}

function finishAll() {
  const isPlan = S.mode === 'plan';
  document.getElementById('completeText').textContent = isPlan ? '🎉 套餐全部完成！' : S.ex.icon + ' ' + S.ex.name + ' 完成！';
  document.getElementById('completeSub').textContent = isPlan ? '茂懿好棒！今日训练达标 ✅' : '做得棒！神经系统正在升级 🌟';
  const btns = document.getElementById('completeButtons');
  btns.innerHTML = '<button class="btn btn-sec" onclick="goHome()">🏠 首页</button><button class="btn btn-pri" onclick="resetPractice()">🔄 再来一组</button>';
  document.getElementById('completeOverlay').classList.add('show');
  logComplete();
}

function resetPractice() {
  closeOverlay();
  cleanupTimer();
  if (S.ex) {
    S.step = -1;
    S.cycle = 1;
    S.playing = false;
    S.remain = 0;
    updateUI();
  }
}

function closeOverlay() {
  document.getElementById('completeOverlay').classList.remove('show');
}

// ====== 开始训练按钮逻辑（点击后自动进入第一步，dur>0自动开始）=====
document.getElementById('actionBtn').addEventListener('click', function() {
  if (!S.ex) return;
  if (S.step === -1) {
    S.step = 0;
    S.cycle = 1;
    updateUI();
    if (S.steps[0] && S.steps[0].dur > 0) {
      startTimer();
    }
    return;
  }
  // 已经是进行中 → 调 handleAction
  handleAction();
});

// ====== 绘图 ======
function drawChar(spread) {
  const c = document.getElementById('practiceCanvas');
  const ctx = c.getContext('2d');
  const w = c.width, h = c.height;
  const cx = w/2, cy = h/2;
  ctx.clearRect(0,0,w,h);

  const armA = 30 + 60 * spread;
  const legA = 15 + 40 * spread;

  ctx.beginPath();
  ctx.arc(cx, cy, 100, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(79,195,247,0.04)';
  ctx.fill();

  const hy = cy - 48 - 10 * (1 - spread);
  ctx.save();

  ctx.beginPath();
  ctx.ellipse(cx, hy + 30, 14, 24, 0, 0, Math.PI*2);
  ctx.fillStyle = '#4fc3f7'; ctx.fill();

  ctx.beginPath();
  ctx.arc(cx, hy, 17, 0, Math.PI*2);
  ctx.fillStyle = '#4fc3f7'; ctx.fill();

  ctx.fillStyle = '#0f1923';
  ctx.beginPath();
  ctx.arc(cx - 5, hy - 2, 2.5, 0, Math.PI*2);
  ctx.arc(cx + 5, hy - 2, 2.5, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(cx, hy + 4, 6, 0.1*Math.PI, 0.9*Math.PI);
  ctx.strokeStyle = '#0f1923'; ctx.lineWidth = 1.5; ctx.stroke();

  const sy = hy + 16;
  ctx.strokeStyle = '#4fc3f7'; ctx.lineWidth = 8; ctx.lineCap = 'round';

  const lx = cx - 14 - 70 * Math.cos((90 - armA) * Math.PI / 180) * spread;
  const ly = sy - 10 + 70 * Math.sin((90 - armA) * Math.PI / 180) * spread;
  ctx.beginPath(); ctx.moveTo(cx - 14, sy); ctx.lineTo(lx, ly); ctx.stroke();

  const rx = cx + 14 + 70 * Math.cos((90 - armA) * Math.PI / 180) * spread;
  const ry = sy - 10 + 70 * Math.sin((90 - armA) * Math.PI / 180) * spread;
  ctx.beginPath(); ctx.moveTo(cx + 14, sy); ctx.lineTo(rx, ry); ctx.stroke();

  const hy2 = hy + 52;
  const llx = cx - 8 - 50 * Math.cos((90 - legA) * Math.PI / 180) * spread;
  const lly = hy2 + 50 * Math.sin((90 - legA) * Math.PI / 180) * spread;
  ctx.beginPath(); ctx.moveTo(cx - 8, hy2); ctx.lineTo(llx, lly); ctx.stroke();

  const rlx = cx + 8 + 50 * Math.cos((90 - legA) * Math.PI / 180) * spread;
  const rly = hy2 + 50 * Math.sin((90 - legA) * Math.PI / 180) * spread;
  ctx.beginPath(); ctx.moveTo(cx + 8, hy2); ctx.lineTo(rlx, rly); ctx.stroke();

  ctx.restore();
}

// ====== 打卡记录（localStorage） ======
function getLogs() {
  try {
    const raw = localStorage.getItem('neuro_logs');
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return [false,false,false,false,false,false,false];
}

function logComplete() {
  const today = new Date().getDay();
  const idx = today === 0 ? 6 : today - 1;
  const logs = getLogs();
  logs[idx] = true;
  localStorage.setItem('neuro_logs', JSON.stringify(logs));
}

// ====== 启动 ======
renderHome();
</script>
