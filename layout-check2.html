<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新布局确认 v2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,'PingFang SC','Noto Sans SC',sans-serif;background:#0f1923;color:#e8edf2;display:flex;gap:30px;padding:30px;flex-wrap:wrap;justify-content:center;}

.phone{width:320px;background:#0f1923;border:2px solid #1f3348;border-radius:28px;overflow:hidden;flex-shrink:0;}
.status{display:flex;justify-content:space-between;padding:14px 20px 6px;font-size:12px;color:#5a7a98;}
.inner{padding:10px 14px 16px;}
.title{font-size:20px;font-weight:700;margin-bottom:2px;}
.hello{font-size:12px;color:#7a94b0;margin-bottom:12px;}

/* 进度卡片 */
.pc{background:#1a2b3c;border-radius:12px;padding:12px;margin-bottom:12px;border:1px solid #1f3348;}
.pc .r{display:flex;justify-content:space-between;font-size:11px;color:#7a94b0;margin-bottom:5px;}
.pc .r .n{color:#4fc3f7;font-size:14px;font-weight:700;}
.pb{height:5px;background:#1f3348;border-radius:2px;overflow:hidden;margin-bottom:4px;}
.pb .f{height:100%;width:33%;background:linear-gradient(90deg,#4fc3f7,#81d4fa);border-radius:2px;}
.pc .sub{font-size:10px;color:#5a7a98;}

/* 标签 - 在卡片外面，独立一行 */
.tags{display:flex;gap:5px;margin-bottom:10px;}
.tagb{flex-shrink:0;padding:5px 11px;border-radius:16px;font-size:11px;background:#1a2b3c;border:1px solid #1f3348;color:#8aa0b8;white-space:nowrap;}
.tagb.ac{background:#2d4c6e;border-color:#4fc3f7;color:#4fc3f7;}

/* 套餐标题 */
.plan-l{font-size:12px;color:#8aa0b8;font-weight:600;margin-bottom:6px;}

/* 练习列表 */
.ex{display:flex;align-items:center;gap:8px;padding:10px;border-radius:8px;background:#1a2b3c;border:1px solid #1f3348;margin-bottom:5px;}
.ex .ck{width:18px;height:18px;border-radius:50%;border:2px solid #2d4c6e;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;}
.ex.done .ck{border-color:#4fc3f7;background:rgba(79,195,247,.1);}
.ex .ic{font-size:16px;width:22px;text-align:center;flex-shrink:0;}
.ex .inf{flex:1;font-size:12px;font-weight:600;}
.ex .inf .s{font-size:10px;font-weight:400;color:#5a7a98;}
.ex .tm{font-size:10px;color:#5a7a98;flex-shrink:0;}
.ex .tm.done{color:#4fc3f7;}

/* 使用说明 */
.us{background:#1a2b3c;border-radius:8px;padding:8px 10px;border:1px solid #1f3348;font-size:11px;color:#7a94b0;margin-top:12px;line-height:1.5;}
.us .ut{color:#8aa0b8;font-weight:600;margin-bottom:2px;}
</style>
</head>
<body>

<div class="phone">
  <div class="status"><span>9:41</span><span>🔋</span></div>
  <div class="inner">
    <div class="title">🧠 神经训练</div>
    <div class="hello">🌅 早上好，茂懿</div>

    <!-- ① 今日完成 - 带背景色框 -->
    <div class="pc">
      <div class="r"><span>今日完成</span><span class="n">1 / 3</span></div>
      <div class="pb"><div class="f" style="width:33%"></div></div>
      <div class="sub">✅ 🐝 蜜蜂呼吸已打卡</div>
    </div>

    <!-- ② 4个标签 - 独立一行，在卡片外面 -->
    <div class="tags">
      <span class="tagb ac">☀️ 早晨</span>
      <span class="tagb">🌤️ 上午</span>
      <span class="tagb">🏃 下午</span>
      <span class="tagb">🌙 睡前</span>
    </div>

    <!-- ③ 当前套餐标题 -->
    <div class="plan-l">☀️ 早晨</div>

    <!-- ④ 练习列表 -->
    <div class="ex done"><div class="ck">✓</div><div class="ic">❄️</div><div class="inf">冷水唤醒 <span class="s">1分钟</span></div><div class="tm done">✅</div></div>
    <div class="ex done"><div class="ck">✓</div><div class="ic">🐝</div><div class="inf">蜜蜂呼吸 <span class="s">2分钟</span></div><div class="tm done">✅</div></div>
    <div class="ex"><div class="ck"></div><div class="ic">⛏️</div><div class="inf">交叉爬行 <span class="s">2分钟</span></div><div class="tm">00:00</div></div>

    <!-- ⑤ 使用说明 -->
    <div class="us">
      <div class="ut">💡 使用说明</div>
      每个练习可跟练（有步骤引导），也可自由做。
    </div>
  </div>
</div>

</body>
</html>
