<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>布局确认</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,'PingFang SC','Noto Sans SC',sans-serif;background:#0f1923;display:flex;gap:30px;padding:30px;flex-wrap:wrap;justify-content:center;align-items:flex-start;}

.phone{width:320px;background:#0f1923;border:2px solid #1f3348;border-radius:28px;overflow:hidden;flex-shrink:0;}

.status{display:flex;justify-content:space-between;padding:14px 20px 6px;font-size:12px;color:#5a7a98;}

.inner{padding:10px 14px 16px;}

.title{font-size:20px;font-weight:700;margin-bottom:2px;}
.hello{font-size:12px;color:#7a94b0;margin-bottom:12px;}

/* 进度卡片 */
.pc{background:#1a2b3c;border-radius:12px;padding:12px;margin-bottom:12px;border:1px solid #1f3348;}
.pc .r{display:flex;justify-content:space-between;font-size:11px;color:#7a94b0;margin-bottom:5px;}
.pc .r .n{color:#4fc3f7;font-size:14px;font-weight:700;}
.pb{height:5px;background:#1f3348;border-radius:2px;overflow:hidden;margin-bottom:4px;}
.pb .f{height:100%;width:33%;background:linear-gradient(90deg,#4fc3f7,#81d4fa);border-radius:2px;}
.pc .sub{font-size:10px;color:#5a7a98;}

/* 套餐标题 */
.plan-l{font-size:12px;color:#8aa0b8;font-weight:600;margin-bottom:6px;}

/* 练习列表 */
.ex{display:flex;align-items:center;gap:8px;padding:10px;border-radius:8px;background:#1a2b3c;border:1px solid #1f3348;margin-bottom:5px;}
.ex .ck{width:18px;height:18px;border-radius:50%;border:2px solid #2d4c6e;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;}
.ex.done .ck{border-color:#4fc3f7;background:rgba(79,195,247,.1);}
.ex .ic{font-size:16px;width:22px;text-align:center;flex-shrink:0;}
.ex .inf{flex:1;font-size:12px;font-weight:600;}
.ex .inf .s{font-size:10px;font-weight:400;color:#5a7a98;}
.ex .tm{font-size:10px;color:#5a7a98;flex-shrink:0;}
.ex .tm.done{color:#4fc3f7;}

/* 标签按钮 */
.tags{display:flex;gap:5px;margin-top:10px;}
.tagb{flex-shrink:0;padding:5px 11px;border-radius:16px;font-size:11px;background:#1a2b3c;border:1px solid #1f3348;color:#8aa0b8;white-space:nowrap;}
.tagb.ac{background:#2d4c6e;border-color:#4fc3f7;color:#4fc3f7;}

/* 使用说明 */
.us{background:#1a2b3c;border-radius:8px;padding:8px 10px;border:1px solid #1f3348;font-size:11px;color:#7a94b0;margin-top:12px;line-height:1.5;}
.us .ut{color:#8aa0b8;font-weight:600;margin-bottom:2px;}

/* ===== 跟练页 ===== */
.p-top{display:flex;align-items:center;padding:12px 14px;gap:8px;border-bottom:1px solid #1f3348;font-size:12px;}
.p-top .bk{font-size:16px;opacity:.7;}
.p-top .mi{flex:1;text-align:center;font-weight:600;font-size:14px;}
.p-top .ri{color:#7a94b0;}

.p-inner{display:flex;flex-direction:column;align-items:center;padding:14px;gap:6px;min-height:530px;}

/* 练习名+信息 */
.ei{text-align:center;margin-bottom:2px;}
.ei .en{font-size:18px;font-weight:700;}
.ei .inf{font-size:10px;color:#5a7a98;}

/* 步骤标签 */
.sn{font-size:11px;color:#5a7a98;}
.sn .st{color:#c8d6e5;margin-left:4px;}

/* 画布 */
.cv{width:180px;height:180px;background:#1a2b3c;border-radius:12px;position:relative;}
.cv .tm{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.cv .tm .n{font-size:28px;font-weight:200;color:#4fc3f7;}
.cv .tm .l{font-size:10px;color:#5a7a98;}

/* 步骤点 */
.dots{display:flex;gap:4px;}
.dots div{width:5px;height:5px;border-radius:50%;background:#1f3348;}
.dots .act{background:#4fc3f7;transform:scale(1.15);}
.dots .dn{background:#a5d6a7;}

/* 步骤卡片 */
.sc{width:100%;max-width:290px;margin-top:auto;background:#1a2b3c;border-radius:10px;padding:10px 12px;border:1px solid #1f3348;font-size:11px;color:#8aa0b8;}

/* 按钮 */
.act{width:100%;max-width:290px;display:flex;flex-direction:column;gap:6px;}
.act .r1{display:flex;gap:6px;}
.act .r1 .b{flex:1;padding:12px;border-radius:10px;font-size:13px;font-weight:600;text-align:center;border:none;}
.bp{background:linear-gradient(135deg,#4fc3f7,#29b6f6);color:#0f1923;}
.bs{background:#1f3348;color:#8aa0b8;}
.bo{padding:11px;border-radius:10px;border:1px solid #2d4c6e;background:transparent;color:#8aa0b8;font-size:13px;font-weight:600;text-align:center;}
</style>
</head>
<body>

<!-- 首页 -->
<div class="phone">
  <div class="status"><span>9:41</span><span>🔋</span></div>
  <div class="inner">
    <div class="title">🧠 神经训练</div>
    <div class="hello">🌅 早上好，茂懿</div>

    <div class="pc">
      <div class="r"><span>今日完成</span><span class="n">1 / 3</span></div>
      <div class="pb"><div class="f"></div></div>
      <div class="sub">✅ 🐝 蜜蜂呼吸已打卡</div>
    </div>

    <div class="plan-l">☀️ 早晨套餐</div>

    <div class="ex done">
      <div class="ck">✓</div><div class="ic">❄️</div>
      <div class="inf">冷水唤醒 <span class="s">1分钟</span></div>
      <div class="tm done">✅ 已完成</div>
    </div>
    <div class="ex done">
      <div class="ck">✓</div><div class="ic">🐝</div>
      <div class="inf">蜜蜂呼吸 <span class="s">2分钟</span></div>
      <div class="tm done">✅ 已完成</div>
    </div>
    <div class="ex">
      <div class="ck"></div><div class="ic">⛏️</div>
      <div class="inf">交叉爬行 <span class="s">2分钟</span></div>
      <div class="tm">未完成</div>
    </div>

    <div class="tags">
      <span class="tagb ac">☀️ 早晨</span>
      <span class="tagb">🌤️ 上午</span>
      <span class="tagb">🏃 下午</span>
      <span class="tagb">🌙 睡前</span>
    </div>

    <div class="us">
      <div class="ut">💡 使用说明</div>
      每个练习可跟练（有步骤引导），也可自由做（做完点"我做完了"）。熟练后无需每次都跟练。
    </div>
  </div>
</div>

<!-- 跟练页 -->
<div class="phone">
  <div class="p-top">
    <span class="bk">✕</span>
    <span class="mi">⛏️ 交叉爬行</span>
    <span class="ri">1/3</span>
  </div>
  <div class="p-inner">

    <div class="ei">
      <div class="en">⛏️ 交叉爬行</div>
      <div class="inf">原始反射整合 · 约2分钟</div>
    </div>

    <div class="sn">步 <span class="st">2/5 · 抬右手时抬左膝</span></div>

    <div class="cv">
      <div class="tm"><div class="n">12</div><div class="l">秒</div></div>
    </div>

    <div class="dots">
      <div class="dn"></div><div class="dn"></div><div class="act"></div><div></div><div></div>
    </div>

    <div class="sc">
      💡 慢慢来，感受对侧协调
    </div>

    <div class="act">
      <div class="r1">
        <div class="b bs">🔄 重来</div>
        <div class="b bp">▶ 下一步</div>
      </div>
      <div class="bo">✅ 我做完了（跳过跟练）</div>
    </div>

  </div>
</div>

</body>
</html>
