<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🧠 海星呼吸 - 神经训练跟练</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'PingFang SC', 'Noto Sans SC', sans-serif;
    background: #0f1923;
    color: #e8edf2;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* ===== 顶部状态栏 ===== */
  .status-bar {
    background: #1a2b3c;
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
    color: #8aa0b8;
    border-bottom: 1px solid #1f3348;
  }
  .status-bar .title {
    font-weight: 600;
    color: #c8d6e5;
    font-size: 16px;
  }
  .status-bar .badge {
    background: #2d4c6e;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    color: #a0c4e8;
  }

  /* ===== 主练习区 ===== */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px;
    overflow-y: auto;
  }

  /* ===== 动作名称 ===== */
  .exercise-title {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 4px;
    text-align: center;
  }
  .exercise-sub {
    font-size: 14px;
    color: #7a94b0;
    margin-bottom: 20px;
    text-align: center;
  }

  /* ===== 画布区 ===== */
  .canvas-wrap {
    width: 280px;
    height: 280px;
    background: #1a2b3c;
    border-radius: 20px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    margin-bottom: 16px;
  }
  #characterCanvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* ===== 计时器 ===== */
  .timer-ring {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 48px;
    height: 48px;
  }
  .timer-ring svg {
    transform: rotate(-90deg);
  }
  .timer-ring .bg { fill: none; stroke: #2d4c6e; stroke-width: 4; }
  .timer-ring .fg { fill: none; stroke: #4fc3f7; stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset 0.3s; }
  .timer-text {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 16px;
    font-weight: 700;
    color: #4fc3f7;
  }

  /* ===== 步骤文字 ===== */
  .step-card {
    width: 100%;
    max-width: 400px;
    background: #1a2b3c;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 12px;
    border: 1px solid #1f3348;
  }
  .step-number {
    font-size: 12px;
    color: #5a7a98;
    margin-bottom: 4px;
    font-weight: 600;
  }
  .step-text {
    font-size: 18px;
    line-height: 1.5;
    font-weight: 500;
  }
  .step-text .highlight {
    color: #4fc3f7;
  }
  .step-hint {
    margin-top: 10px;
    font-size: 13px;
    color: #8aa0b8;
    border-left: 3px solid #2d4c6e;
    padding-left: 12px;
  }

  /* ===== 计数推进 ===== */
  .progress-section {
    width: 100%;
    max-width: 400px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .progress-bar {
    flex: 1;
    height: 6px;
    background: #1f3348;
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #4fc3f7, #81d4fa);
    border-radius: 3px;
    transition: width 0.5s;
  }
  .progress-label {
    font-size: 13px;
    color: #7a94b0;
    white-space: nowrap;
  }

  /* ===== 按钮 ===== */
  .btn-group {
    width: 100%;
    max-width: 400px;
    display: flex;
    gap: 12px;
    margin-top: 8px;
  }
  .btn {
    flex: 1;
    padding: 16px;
    border: none;
    border-radius: 14px;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary {
    background: linear-gradient(135deg, #4fc3f7, #29b6f6);
    color: #0f1923;
  }
  .btn-primary:active { transform: scale(0.97); opacity: 0.9; }
  .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
  .btn-secondary {
    background: #1f3348;
    color: #8aa0b8;
  }
  .btn-secondary:active { background: #2d4c6e; }

  /* ===== 呼吸指示 ===== */
  .breath-indicator {
    margin: 12px 0;
    font-size: 15px;
    color: #7a94b0;
    letter-spacing: 2px;
  }
  .breath-indicator .inhale { color: #4fc3f7; }
  .breath-indicator .exhale { color: #a5d6a7; }
  .breath-indicator .hold { color: #fff176; }

  /* ===== 完整步数指示器 ===== */
  .step-dots {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin: 8px 0;
  }
  .step-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #1f3348;
    transition: all 0.3s;
  }
  .step-dot.active { background: #4fc3f7; transform: scale(1.2); }
  .step-dot.done { background: #a5d6a7; }

  /* ===== 完成动画 ===== */
  .complete-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15,25,35,0.95);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
  }
  .complete-overlay.show { display: flex; }
  .complete-icon { font-size: 64px; }
  .complete-text { font-size: 22px; font-weight: 700; color: #a5d6a7; }
  .complete-sub { font-size: 14px; color: #7a94b0; }

  @media (max-width: 420px) {
    .canvas-wrap { width: 240px; height: 240px; }
    .step-text { font-size: 16px; }
    .exercise-title { font-size: 20px; }
  }
</style>
</head>
<body>

<div class="status-bar">
  <span class="title">🦑 神经跟练</span>
  <span class="badge">第 1 / 6 步</span>
</div>

<div class="main">

  <!-- 标题 -->
  <div class="exercise-title">海星呼吸</div>
  <div class="exercise-sub">守卫者震击回复 🦑 · 约2分钟</div>

  <!-- 画布 -->
  <div class="canvas-wrap">
    <canvas id="characterCanvas" width="280" height="280"></canvas>
    <div class="timer-ring">
      <svg viewBox="0 0 52 52" width="52" height="52">
        <circle class="bg" cx="26" cy="26" r="22"/>
        <circle class="fg" id="timerCircle" cx="26" cy="26" r="22" stroke-dasharray="138.23" stroke-dashoffset="138.23"/>
      </svg>
      <div class="timer-text" id="timerText">4</div>
    </div>
  </div>

  <!-- 呼吸指示 -->
  <div class="breath-indicator" id="breathLabel">🌬️ <span class="inhale">吸气</span></div>

  <!-- 步骤卡片 -->
  <div class="step-card">
    <div class="step-number">📍 当前步骤 <span id="stepCounter">0</span>/6</div>
    <div class="step-text" id="stepText">准备就绪，点击开始</div>
    <div class="step-hint" id="hintText">💡 仰卧，手脚自然展开</div>
  </div>

  <!-- 进度 -->
  <div class="progress-section">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <span class="progress-label" id="progressLabel">0 / 6</span>
  </div>

  <!-- 圆点 -->
  <div class="step-dots" id="stepDots"></div>

  <!-- 按钮 -->
  <div class="btn-group">
    <button class="btn btn-secondary" id="resetBtn">🔄 重来</button>
    <button class="btn btn-primary" id="actionBtn">▶ 开始训练</button>
  </div>
</div>

<!-- 完成弹窗 -->
<div class="complete-overlay" id="completeOverlay">
  <div class="complete-icon">✅</div>
  <div class="complete-text">海星呼吸完成！</div>
  <div class="complete-sub">神经系统正在重置 🌊</div>
  <button class="btn btn-primary" style="max-width:260px;margin-top:12px;" onclick="resetAll()">🔄 再做一次</button>
</div>

<script>
// ===== 画布绘制 =====
const canvas = document.getElementById('characterCanvas');
const ctx = canvas.getContext('2d');

// 人物参数
const cx = 140, cy = 130;
let bodyAngle = 0;        // 0=展开, 1=收回
let breathePhase = 0;     // 0=吸气, 1=屏息, 2=呼气
let animFrame = null;

function drawCharacter(t) {
  ctx.clearRect(0, 0, 280, 280);

  // 背景圈圈
  ctx.beginPath();
  ctx.arc(cx, cy, 100, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(79,195,247,0.05)';
  ctx.fill();

  // 身体
  const spread = 0.3 + 0.7 * bodyAngle; // 角度比例
  const armAngle = 30 + 60 * spread;
  const legAngle = 15 + 40 * spread;

  // 头
  const headY = cy - 48 - 10 * (1 - bodyAngle);

  ctx.save();
  // 身体（躯干）
  ctx.beginPath();
  ctx.ellipse(cx, headY + 30, 14, 24, 0, 0, Math.PI*2);
  ctx.fillStyle = '#4fc3f7';
  ctx.fill();

  // 头
  ctx.beginPath();
  ctx.arc(cx, headY, 17, 0, Math.PI*2);
  ctx.fillStyle = '#4fc3f7';
  ctx.fill();

  // 眼睛
  ctx.fillStyle = '#0f1923';
  ctx.beginPath();
  ctx.arc(cx - 5, headY - 2, 2.5, 0, Math.PI*2);
  ctx.arc(cx + 5, headY - 2, 2.5, 0, Math.PI*2);
  ctx.fill();

  // 微笑
  ctx.beginPath();
  ctx.arc(cx, headY + 4, 6, 0.1 * Math.PI, 0.9 * Math.PI);
  ctx.strokeStyle = '#0f1923';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // 手臂
  const shoulderY = headY + 16;
  ctx.strokeStyle = '#4fc3f7';
  ctx.lineWidth = 8;
  ctx.lineCap = 'round';

  // 左臂
  ctx.beginPath();
  ctx.moveTo(cx - 14, shoulderY);
  const lx = cx - 14 - 70 * Math.cos((90 - armAngle) * Math.PI / 180) * bodyAngle;
  const ly = shoulderY - 10 + 70 * Math.sin((90 - armAngle) * Math.PI / 180) * bodyAngle;
  ctx.lineTo(lx, ly);
  ctx.stroke();

  // 右臂
  ctx.beginPath();
  ctx.moveTo(cx + 14, shoulderY);
  const rx = cx + 14 + 70 * Math.cos((90 - armAngle) * Math.PI / 180) * bodyAngle;
  const ry = shoulderY - 10 + 70 * Math.sin((90 - armAngle) * Math.PI / 180) * bodyAngle;
  ctx.lineTo(rx, ry);
  ctx.stroke();

  // 腿
  const hipY = headY + 52;
  ctx.beginPath();
  ctx.moveTo(cx - 8, hipY);
  const llx = cx - 8 - 50 * Math.cos((90 - legAngle) * Math.PI / 180) * bodyAngle;
  const lly = hipY + 50 * Math.sin((90 - legAngle) * Math.PI / 180) * bodyAngle;
  ctx.lineTo(llx, lly);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(cx + 8, hipY);
  const rlx = cx + 8 + 50 * Math.cos((90 - legAngle) * Math.PI / 180) * bodyAngle;
  const rly = hipY + 50 * Math.sin((90 - legAngle) * Math.PI / 180) * bodyAngle;
  ctx.lineTo(rlx, rly);
  ctx.stroke();

  ctx.restore();

  // 呼吸指示箭头（胸腹区域）
  if (bodyAngle > 0.3) {
    ctx.save();
    const breathSize = 8 + 6 * Math.sin(Date.now() / 600);
    ctx.strokeStyle = 'rgba(165,214,167,0.3)';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.arc(cx, headY + 34, 18 + breathSize * 0.8, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }
}

function animateBody() {
  drawCharacter();
  animFrame = requestAnimationFrame(animateBody);
}
animateBody();

// ===== 步进控制 =====
const steps = [
  { text: '仰卧躺平，手脚自然展开', hint: '💡 找一个舒适平坦的地方', breath: '准备', duration: 0 },
  { text: '慢慢<span class="highlight">吸气</span>，同时手脚向外展开', hint: '💡 想象自己像海星一样张开', breath: 'inhale', duration: 4 },
  { text: '屏住呼吸，保持展开姿态', hint: '💡 感受胸腔和四肢的扩展', breath: 'hold', duration: 2 },
  { text: '慢慢<span class="highlight">呼气</span>，同时手脚收回胸前', hint: '💡 手臂交叉抱胸，双腿弯曲', breath: 'exhale', duration: 6 },
  { text: '全身放松，休息一下', hint: '💡 感受身体的平静', breath: 'rest', duration: 2 },
];

const TOTAL_CYCLES = 5; // 一共做5个循环
let currentStep = -1;     // -1=未开始, 0-4=步骤, 5=完成
let currentCycle = 1;
let isPlaying = false;
let timer = null;
let remainingSeconds = 0;
let dotElements = [];

// 初始化圆点
function initDots() {
  const container = document.getElementById('stepDots');
  container.innerHTML = '';
  for (let i = 1; i <= TOTAL_CYCLES; i++) {
    const dot = document.createElement('div');
    dot.className = 'step-dot' + (i === 1 ? ' active' : '');
    container.appendChild(dot);
    dotElements.push(dot);
  }
}
initDots();

// 更新UI
function updateUI() {
  const badge = document.querySelector('.badge');
  const stepText = document.getElementById('stepText');
  const hintText = document.getElementById('hintText');
  const breathLabel = document.getElementById('breathLabel');
  const stepCounter = document.getElementById('stepCounter');
  const actionBtn = document.getElementById('actionBtn');
  const progressFill = document.getElementById('progressFill');
  const progressLabel = document.getElementById('progressLabel');
  const timerText = document.getElementById('timerText');
  const timerCircle = document.getElementById('timerCircle');

  if (currentStep === -1) {
    badge.textContent = '准备开始';
    stepText.textContent = '准备就绪，点击开始';
    hintText.textContent = '💡 仰卧，手脚自然展开';
    breathLabel.innerHTML = '🌬️ 准备';
    stepCounter.textContent = '0';
    actionBtn.textContent = '▶ 开始训练';
    actionBtn.disabled = false;
    progressFill.style.width = '0%';
    progressLabel.textContent = '0 / ' + TOTAL_CYCLES;
    timerText.textContent = '';
    timerCircle.style.strokeDashoffset = '138.23';
    // 身体合拢
    bodyAngle = 0.1;
    return;
  }

  if (currentStep >= steps.length) {
    // 完成
    if (currentCycle > TOTAL_CYCLES) {
      showComplete();
      return;
    }
    // 进入下一轮
    currentStep = 0;
    currentCycle++;
    updateUI();
    return;
  }

  const s = steps[currentStep];
  badge.textContent = '第 ' + currentCycle + ' / ' + TOTAL_CYCLES + ' 轮 · 步' + (currentStep + 1);
  stepText.innerHTML = s.text;
  hintText.textContent = s.hint;
  stepCounter.textContent = currentStep + 1;

  // 呼吸指示
  if (s.breath === 'inhale') breathLabel.innerHTML = '🌬️ <span class="inhale">吸气 ↑</span>';
  else if (s.breath === 'exhale') breathLabel.innerHTML = '🌬️ <span class="exhale">呼气 ↓</span>';
  else if (s.breath === 'hold') breathLabel.innerHTML = '🌬️ <span class="hold">屏息 —</span>';
  else if (s.breath === 'rest') breathLabel.innerHTML = '🌬️ 放松休息';
  else breathLabel.innerHTML = '🌬️ 准备';

  // 计时器
  if (s.duration > 0 && isPlaying) {
    timerText.textContent = remainingSeconds;
    const totalDash = 138.23;
    const pct = remainingSeconds / s.duration;
    timerCircle.style.strokeDashoffset = totalDash * pct;
  } else if (s.duration > 0) {
    timerText.textContent = s.duration;
    timerCircle.style.strokeDashoffset = 0;
  } else {
    timerText.textContent = '';
    timerCircle.style.strokeDashoffset = '138.23';
  }

  // 进度
  const totalSteps = TOTAL_CYCLES * steps.length;
  const doneSteps = (currentCycle - 1) * steps.length + currentStep;
  const pct = Math.min(100, doneSteps / totalSteps * 100);
  progressFill.style.width = pct + '%';
  progressLabel.textContent = Math.floor(doneSteps) + ' / ' + totalSteps;

  // 按钮
  if (isPlaying) {
    actionBtn.textContent = '⏳ 进行中...';
    actionBtn.disabled = true;
  } else {
    actionBtn.textContent = '▶ 下一步';
    actionBtn.disabled = false;
  }

  // 圆点
  dotElements.forEach((dot, i) => {
    dot.className = 'step-dot';
    if (i + 1 < currentCycle) dot.classList.add('done');
    else if (i + 1 === currentCycle) dot.classList.add('active');
  });

  // 身体动画
  if (currentStep === 0) {
    // 准备 - 合拢
    bodyAngle = 0.1;
  } else if (currentStep === 1) {
    // 吸气 - 展开
    bodyAngle = 0.3 + 0.7 * (1 - remainingSeconds / 4);
  } else if (currentStep === 2) {
    // 屏息 - 保持展开
    bodyAngle = 1;
  } else if (currentStep === 3) {
    // 呼气 - 收回
    bodyAngle = 0.7 * (remainingSeconds / 6);
  } else {
    // 休息
    bodyAngle = 0.1;
  }
}

// 开始计时
function startTimer() {
  if (currentStep < 0 || currentStep >= steps.length) return;
  const s = steps[currentStep];
  if (s.duration <= 0) {
    // 无计时步骤，直接前进
    advance();
    return;
  }
  remainingSeconds = s.duration;
  isPlaying = true;
  updateUI();
  timer = setInterval(() => {
    remainingSeconds--;
    if (remainingSeconds <= 0) {
      clearInterval(timer);
      timer = null;
      isPlaying = false;
      advance();
    } else {
      updateUI();
    }
  }, 1000);
}

// 前进到下一步
function advance() {
  if (currentStep === -1) {
    currentStep = 0;
    currentCycle = 1;
  } else {
    currentStep++;
    if (currentStep >= steps.length) {
      if (currentCycle >= TOTAL_CYCLES) {
        currentStep = steps.length; // 完成的标记
        updateUI();
        showComplete();
        return;
      }
      currentStep = 0;
      currentCycle++;
    }
  }
  isPlaying = false;
  remainingSeconds = 0;
  bodyAngle = currentStep === 0 ? 0.1 : 0.3;
  updateUI();
  // 自动开始计时
  const s = steps[currentStep];
  if (s.duration > 0) {
    startTimer();
  }
}

// 显示完成
function showComplete() {
  document.getElementById('completeOverlay').classList.add('show');
}

// 重来
function resetAll() {
  document.getElementById('completeOverlay').classList.remove('show');
  if (timer) { clearInterval(timer); timer = null; }
  currentStep = -1;
  currentCycle = 1;
  isPlaying = false;
  remainingSeconds = 0;
  bodyAngle = 0.1;
  updateUI();
}

// 事件绑定
document.getElementById('actionBtn').addEventListener('click', () => {
  if (currentStep === -1) {
    advance();
  } else if (!isPlaying && currentStep < steps.length) {
    startTimer();
  }
});

document.getElementById('resetBtn').addEventListener('click', resetAll);

// 初始UI
updateUI();
</script>
</body>
</html>
